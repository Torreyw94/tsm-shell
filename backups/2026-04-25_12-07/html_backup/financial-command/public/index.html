<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>tsm-financial-command · TSM Platform</title>
  <style>
    body{background:#050c14;color:#c2d8ec;font-family:'Share Tech Mono',monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:16px;}
    h1{color:#06b6d4;font-size:1.4rem;letter-spacing:.12em;}
    p{color:#607a94;font-size:.85rem;letter-spacing:.08em;}
    .dot{width:8px;height:8px;border-radius:50%;background:#f59e0b;animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
<script>
window.TSM_UI = {
    runAudit: async (sector, factor) => {
        const feed = document.querySelector('.intelligence-feed-output') || document.getElementById('intelligence-feed-output');
        if (feed) feed.innerHTML = '<span style="color: #00ffff;">[STRATEGIST] Internal Link: Processing...</span>';
        try {
            const res = await fetch('/api/audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: `auditops "${sector}" --factor "${factor}" --logic strategist` })
            });
            const data = await res.json();
            if (feed) feed.innerText = `[STRATEGIST] ${data.output || "Analysis Complete."}`;
        } catch (e) {
            if (feed) feed.innerText = "[STRATEGIST] Local API Bridge Failed.";
        }
    }
};
// Wire the sector cards to the auto-fill search prompt logic
document.addEventListener('click', (e) => {
    const card = e.target.closest('.module-card');
    if (card) {
        const sector = card.dataset.sector || "Construction";
        const factor = card.querySelector('h3')?.innerText || "General Audit";
        TSM_UI.runAudit(sector, factor);
    }
});
console.log("TSM_UI: Direct Neural Link Established.");
</script>
</head>
<body>
  <div class="dot"></div>
  <h1>TSM-FINANCIAL-COMMAND</h1>
  <p>MIGRATING TO FLY.DEV · TSM PLATFORM</p>
  <p style="color:#3a5a6a;">financial-command.tsmatter.com</p>
</body>
</html>
