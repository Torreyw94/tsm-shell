<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TSM Executive Portal</title>
    <style>
        body { background: #05070a; color: #ffffff; font-family: sans-serif; padding: 40px; }
        .stat-card { border-top: 4px solid #00f2ff; background: #111827; padding: 20px; margin-bottom: 20px; border-radius: 4px; }
        .roadmap-container { border-left: 4px solid #ff0055; padding-left: 20px; background: rgba(255, 0, 85, 0.05); padding: 20px; margin-top: 30px; }
        h1 { color: #00f2ff; letter-spacing: 2px; text-transform: uppercase; }
        pre { white-space: pre-wrap; font-family: 'Courier New', monospace; color: #ccd6f6; line-height: 1.5; }
    </style>
<script>
window.TSM_UI = {
    runAudit: async (sector, factor) => {
        const feed = document.querySelector('.intelligence-feed-output') || document.getElementById('intelligence-feed-output');
        if (feed) feed.innerHTML = '<span style="color: #00ffff;">[STRATEGIST] Internal Link: Processing...</span>';
        try {
            const res = await fetch('/api/audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: `auditops "${sector}" --factor "${factor}" --logic strategist` })
            });
            const data = await res.json();
            if (feed) feed.innerText = `[STRATEGIST] ${data.output || "Analysis Complete."}`;
        } catch (e) {
            if (feed) feed.innerText = "[STRATEGIST] Local API Bridge Failed.";
        }
    }
};
// Wire the sector cards to the auto-fill search prompt logic
document.addEventListener('click', (e) => {
    const card = e.target.closest('.module-card');
    if (card) {
        const sector = card.dataset.sector || "Construction";
        const factor = card.querySelector('h3')?.innerText || "General Audit";
        TSM_UI.runAudit(sector, factor);
    }
});
console.log("TSM_UI: Direct Neural Link Established.");
</script>
</head>
<body>
    <h1>STRATEGIC EXECUTIVE PORTAL</h1>
    <p>Unified Leadership View • Main-Strategist Consolidated BNCA</p>

    <div class="stat-card">
        <h2>REVENUE AT RISK: .8M</h2>
        <p>Status: Monitoring 15 Sovereign Mesh Nodes | Reporting: Active</p>
    </div>

    <div class="roadmap-container">
        <h3>CFO STRATEGIC ROADMAP</h3>
        <div id="report-content">Fetching real-time data from Main-Strategist...</div>
    </div>

    <script>
        async function loadReport() {
            try {
                const res = await fetch('/api/hc/cfo-report');
                const data = await res.json();
                document.getElementById('report-content').innerHTML = '<pre>' + data.report + '</pre>';
            } catch (e) {
                document.getElementById('report-content').innerText = 'Error connecting to Intelligence Layer.';
            }
        }
        loadReport();
    </script>
</body>
</html>
