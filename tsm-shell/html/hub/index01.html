<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TSM Hub</title>
<style>
/* TSM_SCROLL_FIX */
html, body {
  height: 100%;
  overflow-y: auto;
}
main {
  padding-bottom: 80px !important;
  min-height: calc(100vh - 60px);
}
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 32px;
  z-index: 10;
}
.ask-bar {
  position: fixed;
  bottom: 40px;
  right: 12px;
  z-index: 20;
}
.panel {
  max-height: 60vh;
  overflow-y: auto;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'ui-monospace',SFMono-Regular,Menlo,monospace;background:#0b1120;color:#e5e7eb;display:grid;grid-template-columns:280px 1fr;height:100vh;overflow:hidden}
.sidebar{background:#0d1526;border-right:1px solid #1a2540;display:flex;flex-direction:column;overflow:hidden}
.header{padding:12px 16px;border-bottom:1px solid #1a2540;display:flex;align-items:center;gap:8px}
.logo{font-size:11px;font-weight:800;color:#7dd3fc;letter-spacing:.15em;text-transform:uppercase}
.badge{font-size:9px;padding:2px 6px;background:#7c3aed22;border:1px solid #7c3aed55;border-radius:4px;color:#a78bfa;letter-spacing:.05em}
.search{padding:8px 10px;border-bottom:1px solid #1a2540}
.search input{width:100%;font-size:12px;padding:7px 10px;border:1px solid #1e2d47;border-radius:6px;outline:none;background:#081018;color:#e5e7eb;font-family:inherit}
.search input::placeholder{color:#4b5563}
.sectors{padding:8px 10px;border-bottom:1px solid #1a2540;display:flex;flex-wrap:wrap;gap:4px}
.sector-btn{font-size:10px;padding:3px 8px;border:1px solid #1e2d47;border-radius:4px;background:transparent;color:#6b7280;cursor:pointer;font-family:inherit;transition:all .15s}
.sector-btn:hover{border-color:#334155;color:#94a3b8}
.sector-btn.active{background:#1e3a5f;border-color:#3b82f6;color:#93c5fd}
.count{font-size:10px;color:#4b5563;padding:6px 14px;border-bottom:1px solid #1a2540;display:flex;justify-content:space-between}
.count span{color:#6b7280}
.list{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:#1e2d47 transparent}
.list::-webkit-scrollbar{width:3px}
.list::-webkit-scrollbar-track{background:transparent}
.list::-webkit-scrollbar-thumb{background:#1e2d47;border-radius:2px}
.group-label{padding:8px 14px 4px;font-size:9px;font-weight:700;color:#374151;letter-spacing:.12em;text-transform:uppercase;border-top:1px solid #111d30;margin-top:4px}
.group-label:first-child{border-top:none;margin-top:0}
.item{padding:8px 14px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;color:#9ca3af;border-bottom:1px solid #0e1829;transition:all .12s}
.item:hover{background:#111f35;color:#e5e7eb}
.item.active{background:#1a2e4a;color:#7dd3fc;border-left:2px solid #3b82f6;padding-left:12px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:all .15s}
.dot.local{background:#1e3a5f;border:1px solid #2563eb44}
.dot.ext{background:#3a2a05;border:1px solid #92400e55}
.item.active .dot{background:#3b82f6;box-shadow:0 0 6px #3b82f680}
.tag{font-size:8px;padding:1px 5px;border-radius:3px;margin-left:auto;flex-shrink:0;letter-spacing:.06em;font-weight:700}
.tag.local{background:#0f2a1a;border:1px solid #166534;color:#4ade80}
.tag.ext{background:#1c1305;border:1px solid #78350f;color:#f59e0b}
.main{display:flex;flex-direction:column;background:#060d1a}
.bar{padding:8px 14px;border-bottom:1px solid #1a2540;display:flex;align-items:center;gap:6px;background:#0a1628}
.url{flex:1;font-size:11px;padding:7px 10px;border:1px solid #1a2d47;border-radius:6px;background:#060d1a;color:#4b6584;font-family:inherit;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-btn{font-size:11px;padding:7px 11px;border:1px solid #1a2d47;border-radius:6px;background:#0d1a2e;color:#9ca3af;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.bar-btn:hover{background:#162035;color:#e5e7eb;border-color:#2563eb44}
.frame-wrap{flex:1;position:relative;overflow:hidden}
iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#fff}
.ext-splash{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#060d1a;z-index:5}
.ext-splash.visible{display:flex}
.splash-glyph{font-size:38px;opacity:.2;line-height:1}
.splash-name{font-size:15px;color:#7dd3fc;letter-spacing:.04em;font-weight:700}
.splash-sub{font-size:11px;color:#374151}
.splash-url{font-size:10px;color:#1e3a5f;max-width:420px;text-align:center;word-break:break-all}
.splash-btn{font-size:11px;padding:8px 20px;background:#1e3a5f;border:1px solid #3b82f6;border-radius:6px;color:#93c5fd;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:.05em;margin-top:4px}
.splash-btn:hover{background:#1d4ed8;color:#fff}
.foot{padding:6px 14px;border-top:1px solid #1a2540;font-size:10px;color:#374151;background:#0a1628;display:flex;gap:16px;align-items:center}
.live{color:#22c55e;font-weight:700;letter-spacing:.05em}
#active-label{color:#6b7280}
.empty{padding:40px 20px;text-align:center;color:#374151;font-size:12px;line-height:1.8}
</style>
</head>
<body>
<div class="sidebar">
  <div class="header">
    <span class="logo">TSM Hub</span>
    <span class="badge">LIVE</span>
  </div>
  <div class="search"><input id="q" placeholder="Search apps..." oninput="filterApps(this.value)"></div>
  <div class="sectors" id="sector-tabs"></div>
  <div class="count"><span id="count">0 apps</span><span id="sector-label">ALL</span></div>
  <div class="list" id="list"></div>
</div>
<div class="main">
  <div class="bar">
    <div class="url" id="url-bar">select an app</div>
    <button class="bar-btn" onclick="reloadFrame()">⟳ Reload</button>
    <button class="bar-btn" onclick="openCurrentTab()">↗ Open</button>
  </div>
  <div class="frame-wrap">
    <iframe id="frame" src="about:blank"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"></iframe>
    <div class="ext-splash" id="ext-splash">
      <div class="splash-glyph">↗</div>
      <div class="splash-name" id="splash-name"></div>
      <div class="splash-sub">External app · opened in new tab</div>
      <div class="splash-url" id="splash-url"></div>
      <button class="splash-btn" onclick="openCurrentTab()">Open Again ↗</button>
    </div>
  </div>
  <div class="foot">
    <span class="live">● live</span>
    <span id="active-label">none selected</span>
    <span style="margin-left:auto">tsm-shell hub · tsm-shell.fly.dev</span>
  </div>
</div>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// NGINX ROUTING REFERENCE (nginx.conf):
//   location /html/  → alias /usr/share/nginx/html/
//     so /html/foo.html        → serves foo.html at root
//        /html/foo-html/       → serves foo-html/ directory (needs index.html)
//        /html/foo.tsmatter.html → serves foo.tsmatter.html at root
//   location /       → try_files $uri $uri/ =404
//
// FILE NAMING ON DISK:
//   <key>.tsmatter.html  → local copy of formerly-external app
//   <key>.html           → standalone local app
//   <key>-html/          → directory-based app (agents-ins-html/, auditops-pro-html/)
//   honorhealth-dee.html → fly.dev remote, load in iframe
// ─────────────────────────────────────────────────────────────────────────────

// Whether a URL should open in new tab (blocks iframes)
function isExternal(url) {
  return url && url.includes('tsmatter.com');
}

// ── DEPLOYED (local) APPS — url is the exact nginx-served path ───────────────
// Pattern: /html/<filename> hits the alias → serves the file from root
const LOCAL_APPS = [

  // ── Healthcare ──────────────────────────────────────────────────────────────
  { sector:'Healthcare', name:'HonorHealth Command',  url:'/html/honorhealth-dee.html' },
  { sector:'Healthcare', name:'HC Billing',           url:'/html/hc-billing.tsmatter.html' },
  { sector:'Healthcare', name:'HC Compliance',        url:'/html/hc-compliance.tsmatter.html' },
  { sector:'Healthcare', name:'HC Financial',         url:'/html/hc-financial.tsmatter.html' },
  { sector:'Healthcare', name:'HC Grants',            url:'/html/hc-grants.tsmatter.html' },
  { sector:'Healthcare', name:'HC Insurance',         url:'/html/hc-insurance.tsmatter.html' },
  { sector:'Healthcare', name:'HC Legal',             url:'/html/hc-legal.tsmatter.html' },
  { sector:'Healthcare', name:'HC Medical',           url:'/html/hc-medical.tsmatter.html' },
  { sector:'Healthcare', name:'HC Pharmacy',          url:'/html/hc-pharmacy.tsmatter.html' },
  { sector:'Healthcare', name:'HC Strategist',        url:'/html/hc-strategist.tsmatter.html' },
  { sector:'Healthcare', name:'HC Tax Prep',          url:'/html/hc-taxprep.tsmatter.html' },
  { sector:'Healthcare', name:'HC Vendors',           url:'/html/hc-vendors.tsmatter.html' },
  { sector:'Healthcare', name:'HonorHealth Dee',      url:'https://tsm-honorhealth-dee.fly.dev/' },
  { sector:'Healthcare', name:'Honor Portal',         url:'/html/honor-portal/' },
  { sector:'Healthcare', name:'DME',                  url:'/html/dme.html' },
  { sector:'Healthcare', name:'Healthcare Command',   url:'/html/healthcare-command.html' },
  { sector:'Healthcare', name:'TSM HonorHealth',      url:'/html/tsm-honorhealth-dee.tsmatter.html' },

  // ── BPO ─────────────────────────────────────────────────────────────────────
  { sector:'BPO', name:'BPO Legal',                   url:'/html/bpo-legal.tsmatter.html' },
  { sector:'BPO', name:'BPO Realty',                  url:'/html/bpo-realty.tsmatter.html' },
  { sector:'BPO', name:'BPO Tax',                     url:'/html/bpo-tax.tsmatter.html' },

  // ── Financial ───────────────────────────────────────────────────────────────
  { sector:'Financial', name:'Financial Command',     url:'/html/financial-command.tsmatter.html' },
  { sector:'Financial', name:'Desert Financial',      url:'/html/desert-financial.tsmatter.html' },
  { sector:'Financial', name:'Strategist',            url:'/html/strategist00.tsmatter.html' },
  { sector:'Financial', name:'Strategist Index',      url:'/html/strategist-index.html' },
  { sector:'Financial', name:'Financial',             url:'/html/financial.html' },

  // ── Construction ────────────────────────────────────────────────────────────
  { sector:'Construction', name:'Construction Command', url:'/html/construction-command.tsmatter.html' },
  { sector:'Construction', name:'Construction Center',  url:'/html/construction-center.html' },
  { sector:'Construction', name:'Construction',         url:'/html/construction.html' },
  { sector:'Construction', name:'Ameris Portal',        url:'/html/ameris-portal/' },

  // ── Insurance ───────────────────────────────────────────────────────────────
  { sector:'Insurance', name:'PC Command',            url:'/html/pc-command.tsmatter.html' },
  { sector:'Insurance', name:'AZ Insurance',          url:'/html/az-ins.tsmatter.html' },
  { sector:'Insurance', name:'AZ Life',               url:'/html/az-life.html' },

  // ── Enterprise ──────────────────────────────────────────────────────────────
  { sector:'Enterprise', name:'Agents',               url:'/html/agents-ins-html/' },
  { sector:'Enterprise', name:'Agents (HTML)',        url:'/html/agents-ins.html' },
  { sector:'Enterprise', name:'AuditOps Pro',         url:'/html/auditops-pro-html/' },
  { sector:'Enterprise', name:'AuditOps Pro (HTML)',  url:'/html/auditops-pro.html' },
  { sector:'Enterprise', name:'Suite Builder',        url:'/html/suite-builder.html' },
  { sector:'Enterprise', name:'RRD Command',          url:'/html/rrd-command.tsmatter.html' },
  { sector:'Enterprise', name:'Case Tech',            url:'/html/case-tech.tsmatter.html' },
  { sector:'Enterprise', name:'REO Pro',              url:'/html/reo-pro.tsmatter.html' },
  { sector:'Enterprise', name:'REO Command',          url:'/html/reo-command.html' },
  { sector:'Enterprise', name:'Zero Trust',           url:'/html/zero-trust.html' },
  { sector:'Enterprise', name:'Schools Command',      url:'/html/schools-command.html' },
  { sector:'Enterprise', name:'Mortgage Command',     url:'/html/mortgage-command.html' },
  { sector:'Enterprise', name:'Concierge Command',    url:'/html/concierge-command.html' },
  { sector:'Enterprise', name:'Access',               url:'/html/access.html' },
];

// ── EXTERNAL APPS (tsmatter.com — open in new tab) ───────────────────────────
const SECTORS = [
  {label:'Healthcare', apps:[
    {name:'Healthcare Command',   url:'https://healthcare.tsmatter.com'},
    {name:'Banner Health',        url:'https://banner-health.tsmatter.com'},
    {name:'HonorHealth',          url:'https://honorhealth.tsmatter.com'},
    {name:'Abrazo Health',        url:'https://abrazo.tsmatter.com'},
    {name:'Valleywise Health',    url:'https://valleywise.tsmatter.com'},
    {name:'HealthOps BPO',        url:'https://bpo-healthcare.tsmatter.com'},
  ]},
  {label:'Insurance', apps:[
    {name:'Insurance Command',    url:'https://insurance-command.tsmatter.com'},
    {name:'AZ Insurance Portal',  url:'https://az-ins.tsmatter.com'},
    {name:'P&C Enterprise Cmd',   url:'https://pc-command.tsmatter.com'},
  ]},
  {label:'Financial', apps:[
    {name:'Financial Command',    url:'https://financial-command.tsmatter.com'},
    {name:'Desert Financial',     url:'https://desert-financial.tsmatter.com'},
    {name:'Financial',            url:'https://financial.tsmatter.com'},
    {name:'Compliance',           url:'https://compliance.tsmatter.com'},
    {name:'Tax Intelligence',     url:'https://tax.tsmatter.com'},
    {name:'Zero Trust',           url:'https://zero-trust.tsmatter.com'},
    {name:'Strategist',           url:'https://strategist00.tsmatter.com'},
  ]},
  {label:'Real Estate', apps:[
    {name:'Mortgage Command',     url:'https://mortgage-command.tsmatter.com'},
    {name:'Real Estate Command',  url:'https://real-estate-command.tsmatter.com'},
    {name:'Mortgage',             url:'https://mortgage.tsmatter.com'},
    {name:'BrokerOps BPO',        url:'https://bpo-realty.tsmatter.com'},
    {name:'REO Pro',              url:'https://reo-pro.tsmatter.com'},
  ]},
  {label:'Construction', apps:[
    {name:'Construction Command', url:'https://construction-command.tsmatter.com'},
    {name:'Construction',         url:'https://construction.tsmatter.com'},
    {name:'ConstructionOps BPO',  url:'https://bpo-construction.tsmatter.com'},
    {name:'Ameris Construction',  url:'https://ameris-construction.tsmatter.com'},
  ]},
  {label:'Legal', apps:[
    {name:'Legal Intelligence',   url:'https://legal.tsmatter.com'},
    {name:'LegalOps BPO',         url:'https://bpo-legal.tsmatter.com'},
    {name:'Legal Analyst Pro',    url:'https://legal-analyst-pro.tsmatter.com'},
  ]},
  {label:'Education', apps:[
    {name:'Schools Command',      url:'https://schools-command.tsmatter.com'},
    {name:'Schools',              url:'https://schools.tsmatter.com'},
  ]},
  {label:'Hospitality', apps:[
    {name:'HotelOps Pro',         url:'https://hotelops.tsmatter.com'},
    {name:'Concierge Command',    url:'https://concierge-command.tsmatter.com'},
    {name:'HotelOps BPO',         url:'https://bpo-hotelops.tsmatter.com'},
  ]},
  {label:'Enterprise', apps:[
    {name:'DocPro',               url:'https://docpro.tsmatter.com'},
    {name:'RRD Command',          url:'https://rrd-command.tsmatter.com'},
    {name:'Appointments',         url:'https://appointments.tsmatter.com'},
    {name:'AuditOps',             url:'https://auditops.tsmatter.com'},
    {name:'Music Command',        url:'https://music-command.tsmatter.com'},
    {name:'AI',                   url:'/api/ai/query'},
    {name:'Case Tech',            url:'https://case-tech.tsmatter.com'},
  ]},
  {label:'Demo Decks', apps:[
    {name:'Desert Financial Pitch', url:'https://clients.tsmatter.com/demo/desert-financial-pitch.html'},
    {name:'Command Promo',          url:'https://clients.tsmatter.com/demo/command-promo.html'},
    {name:'Why TSM',                url:'https://clients.tsmatter.com/demo/why-tsm.html'},
    {name:'Bundle Demo',            url:'https://clients.tsmatter.com/demo/bundle.html'},
    {name:'Financial Analyst',      url:'https://clients.tsmatter.com/demo/financial-analyst.html'},
    {name:'BNCA GTM HC',            url:'/html/demo/bnca-gtm-hc.html'},
    {name:'Demo Click Guide',       url:'/html/demo/demo-click-guide.html'},
    {name:'Desert Pitch',           url:'/html/demo/desert-pitch.html'},
    {name:'Honor Portal DM',        url:'/html/demo/honor-portal-dm.html'},
    {name:'Strategist HC',          url:'/html/demo/strategist-hc.html'},
    {name:'Suite Builder Demo',     url:'/html/demo/suite-builder.html'},
    {name:'Tax',                    url:'/html/demo/tax.html'},
    {name:'TSM Pricing',            url:'/html/demo/tsm-pricing.html'},
  ]},
];

const EXT_APPS       = SECTORS.flatMap(s => s.apps.map(a => ({...a, sector:s.label, external:true})));
const UNIQUE_SECTORS = ['All', 'Deployed', ...SECTORS.map(s => s.label)];

// ── State ─────────────────────────────────────────────────────────────────────
let activeFilter = 'All';
let searchQuery  = '';
let currentId    = null;
let currentUrl   = null;
let currentName  = null;

function buildSectorTabs() {
  document.getElementById('sector-tabs').innerHTML = UNIQUE_SECTORS.map(s =>
    `<button class="sector-btn${s===activeFilter?' active':''}" onclick="setSector('${s}')">${s}</button>`
  ).join('');
}

function setSector(s) {
  activeFilter = s; searchQuery = '';
  document.getElementById('q').value = '';
  buildSectorTabs(); render();
}

function getVisible() {
  const q = searchQuery.toLowerCase();
  let pool = activeFilter==='All'      ? [...LOCAL_APPS,...EXT_APPS]
           : activeFilter==='Deployed' ? LOCAL_APPS
           : EXT_APPS.filter(a=>a.sector===activeFilter);
  if (q) pool = pool.filter(a=>
    a.name.toLowerCase().includes(q) || (a.url||'').toLowerCase().includes(q)
  );
  return pool;
}

function render() {
  const visible = getVisible();
  document.getElementById('count').textContent = visible.length + ' apps';
  document.getElementById('sector-label').textContent = activeFilter.toUpperCase();
  if (!visible.length) {
    document.getElementById('list').innerHTML = '<div class="empty">No apps match.</div>';
    return;
  }
  const grouped = {};
  visible.forEach(a => { const g=a.sector||'Other'; (grouped[g]=grouped[g]||[]).push(a); });
  document.getElementById('list').innerHTML = Object.keys(grouped).map(g =>
    `<div class="group-label">${g}</div>` + grouped[g].map(itemHtml).join('')
  ).join('');
  if (currentId) {
    document.querySelectorAll('.item').forEach(el=>
      el.classList.toggle('active', el.dataset.id===currentId)
    );
  }
}

function itemHtml(a) {
  const id  = a.url;
  const ext = !!a.external;
  return `<div class="item" data-id="${id}" data-name="${a.name}" data-ext="${ext}" onclick="loadApp(this)">
    <span class="dot ${ext?'ext':'local'}"></span>
    <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.name}</span>
    <span class="tag ${ext?'ext':'local'}">${ext?'EXT':'LOCAL'}</span>
  </div>`;
}

function loadApp(el) {
  const id   = el.dataset.id;
  const name = el.dataset.name;
  currentId   = id;
  currentUrl  = id;
  currentName = name;

  document.querySelectorAll('.item').forEach(e=>e.classList.toggle('active',e.dataset.id===id));
  document.getElementById('url-bar').textContent = id;
  document.getElementById('active-label').textContent = name;

  if (isExternal(id)) {
    // Open in new tab, show splash instead of blank iframe
    window.open(id, '_blank');
    document.getElementById('frame').src = 'about:blank';
    document.getElementById('splash-name').textContent = name;
    document.getElementById('splash-url').textContent  = id;
    document.getElementById('ext-splash').classList.add('visible');
  } else {
    document.getElementById('ext-splash').classList.remove('visible');
    document.getElementById('frame').src = id;
  }
}

function reloadFrame() {
  if (!currentUrl || isExternal(currentUrl)) return;
  const f = document.getElementById('frame');
  const s = f.src;
  f.src = 'about:blank';
  setTimeout(()=>{ f.src=s; }, 80);
}

function openCurrentTab() {
  if (currentUrl && currentUrl !== 'about:blank') window.open(currentUrl, '_blank');
}

function filterApps(q) { searchQuery=q; render(); }

// ── Boot ──────────────────────────────────────────────────────────────────────
buildSectorTabs();
render();
const first = LOCAL_APPS[0];
if (first) {
  currentId=currentUrl=first.url; currentName=first.name;
  document.getElementById('url-bar').textContent      = first.url;
  document.getElementById('frame').src                = first.url;
  document.getElementById('active-label').textContent = first.name;
  setTimeout(()=>{
    document.querySelectorAll('.item').forEach(el=>
      el.classList.toggle('active', el.dataset.id===first.url)
    );
  }, 50);
}
</script>
</body>
</html>
