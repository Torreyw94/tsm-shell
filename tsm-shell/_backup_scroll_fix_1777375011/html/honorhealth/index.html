
<!DOCTYPE html><html lang="en"><head>



<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HonorHealth | Command Center</title><style>
<link rel="stylesheet" href="/library-style.css"><script src="/library-core.js"></script>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#00a86b;--bg:#020c06;--panel:#041408;--border:#0d2b12;--text:#8ab890;--bright:#e8ffe8;--dim:#2a5c35;--mono:'Share Tech Mono',monospace;--ui:'Rajdhani',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh}
.hdr{background:var(--panel);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--ui);font-size:20px;font-weight:700;color:var(--g);letter-spacing:3px}.logo span{color:var(--text);font-weight:400}
.badge{font-size:9px;color:var(--dim);letter-spacing:2px;margin-top:2px}.powered{font-size:9px;color:var(--dim);letter-spacing:1px}
.wrap{max-width:1200px;margin:0 auto;padding:32px 24px}
.welcome{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--g);padding:20px 24px;margin-bottom:28px}
.wt{font-family:var(--ui);font-size:22px;font-weight:700;color:var(--bright);letter-spacing:2px;margin-bottom:6px}
.ws{font-size:11px;color:var(--dim);letter-spacing:2px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat{background:var(--panel);border:1px solid var(--border);padding:16px;text-align:center}
.stat-val{font-family:var(--ui);font-size:28px;font-weight:700;color:var(--g)}.stat-label{font-size:9px;color:var(--dim);letter-spacing:2px;margin-top:4px}
.sh{font-size:9px;color:var(--dim);letter-spacing:3px;margin-bottom:12px}
.sh::before{content:'◆ ';color:var(--g);font-size:8px}
.apps{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-bottom:28px}
.app-card{background:var(--panel);border:1px solid var(--border);padding:20px;cursor:pointer;transition:border .2s,transform .2s}
.app-card:hover{border-color:var(--g);transform:translateY(-2px)}
.app-icon{font-size:24px;margin-bottom:10px}.app-name{font-family:var(--ui);font-size:16px;font-weight:700;color:var(--bright);letter-spacing:1px;margin-bottom:4px}
.app-desc{font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:12px;line-height:1.5}
.app-btn{display:inline-block;background:var(--g);color:#000;padding:6px 14px;font-family:var(--ui);font-size:11px;font-weight:700;letter-spacing:1px;text-decoration:none}
.presets{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:28px}
.preset{background:var(--panel);border:1px solid var(--border);padding:12px;cursor:pointer;transition:border .2s}
.preset:hover{border-color:var(--g)}.preset-title{font-size:11px;color:var(--bright);font-weight:700;margin-bottom:4px}.preset-desc{font-size:9px;color:var(--dim)}
.chat{background:var(--panel);border:1px solid var(--border);padding:24px;margin-bottom:28px}
.ct{font-size:10px;color:var(--dim);letter-spacing:3px;margin-bottom:16px}.ct::before{content:'◆ ';color:var(--g);font-size:8px}
.cw{background:#010a03;border:1px solid var(--border);height:320px;overflow-y:auto;padding:16px;margin-bottom:12px}
.msg{display:flex;gap:10px;margin-bottom:16px}
.av{width:28px;height:28px;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;color:#000;font-weight:700}
.mb{flex:1}.ml{font-size:8px;color:var(--dim);letter-spacing:2px;margin-bottom:4px}.mt{font-size:12px;color:var(--text);line-height:1.6;white-space:pre-wrap}
.ci{display:flex;gap:8px}
.inp{flex:1;background:#010a03;border:1px solid var(--border);color:var(--bright);font-family:var(--mono);font-size:12px;padding:10px 12px;outline:none}
.inp:focus{border-color:var(--g)}
.btn{background:var(--g);color:#000;border:none;padding:10px 20px;font-family:var(--ui);font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px}
.footer{text-align:center;font-size:9px;color:var(--dim);letter-spacing:2px;padding:20px}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.apps{grid-template-columns:1fr}}
</style>



<script>
window.switchTab = function(id, btn) {
  // Hide all
  const tabs = document.querySelectorAll('[id^="tab-"]');
  for(let t of tabs) { t.setAttribute('style', 'display: none !important'); }
  
  // Show target
  const target = document.getElementById('tab-' + id) || document.getElementById(id);
  if (target) target.setAttribute('style', 'display: block !important');
  
  // UI Cleanup
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
};
console.log("TSM Engine Active for honorhealth");
</script>

<script id="tsm-core-engine">
(function() {
  window.switchTab = function(id, btn) {
    const tabs = document.querySelectorAll('[id^="tab-"]');
    tabs.forEach(t => t.style.display = 'none');
    const target = document.getElementById('tab-' + id) || document.getElementById(id);
    if (target) target.style.display = 'block';
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
  };
})();
</script>
</body></html>
