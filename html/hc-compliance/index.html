<!DOCTYPE html><html lang="en"><head>



<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HC COMPLIANCE COMMAND &middot; TSM Healthcare</title>






<script>
  function switchTab(id, btn) {
    console.log("Switching to:", id);
    // Hide all
    document.querySelectorAll('div[id]').forEach(el => {
      if(el.id.includes('tab-') || ['dash','matters','contracts','claims','ai'].includes(el.id)) {
        el.style.display = 'none';
      }
    });
    // Show target
    var t = document.getElementById(id) || document.getElementById('tab-' + id);
    if(t) t.style.display = 'block';
    // Active class
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');
  }
  window.onload = function() {
    var first = document.querySelector('.nav-btn');
    if(first) first.click();
  };
</script>
</head><body>




</body></html>
