<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuditOps | HC-VENDORS</title>
  





<script>
  window.switchTab = function(id, btn) {
    console.log("TSM Switch:", id);
    const tabs = ['tab-dash', 'tab-matters', 'tab-contracts', 'tab-ai', 'tab-presets', 'tab-regulatory', 'tab-claims', 'tab-coding'];
    tabs.forEach(t => {
      const el = document.getElementById(t);
      if (el) el.style.setProperty('display', 'none', 'important');
    });
    const target = document.getElementById(id) || document.getElementById('tab-' + id);
    if (target) target.style.setProperty('display', 'block', 'important');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
  };
  window.addEventListener('load', () => {
    const first = document.querySelector('.nav-btn');
    if (first) {
      const id = first.getAttribute('onclick')?.match(/'([^']+)'/)?.[1] || 'tab-dash';
      window.switchTab(id, first);
    }
  });
</script>
</head><body>




</body></html>
