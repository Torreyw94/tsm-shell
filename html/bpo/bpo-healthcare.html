<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Healthcare BPO · TSM Matter</title>
<style>
:root{--a:#00ffc6;--bg:#05090d;--p:#081522;--b:rgba(255,255,255,.09);--t:#e8f7ff;--m:#8aa6b7}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top right,rgba(0,255,198,.08),transparent 35%),var(--bg);color:var(--t);font-family:Inter,system-ui,Arial}a{color:var(--a);text-decoration:none}
header{display:flex;justify-content:space-between;align-items:center;padding:16px 22px;background:#07131d;border-bottom:1px solid var(--b)}
.logo{color:var(--a);font-weight:900;letter-spacing:.18em}.sub{color:var(--m);font-size:11px;letter-spacing:.12em}
.top-actions{display:flex;gap:8px;align-items:center}select,.pill{background:#0b1722;color:#dff7ff;border:1px solid var(--b);border-radius:9px;padding:9px 12px;font-weight:800}
#nav{display:flex;gap:8px;padding:10px 20px;background:#07131d;border-bottom:1px solid var(--b);overflow:auto}.nb{background:#0b1722;color:#dff7ff;border:1px solid var(--b);border-radius:8px;padding:9px 12px;font-weight:800;white-space:nowrap;cursor:pointer}.nb.active,.nb:hover{color:var(--a);border-color:var(--a)}
#app{display:flex}aside{width:240px;background:#07131d;min-height:calc(100vh - 110px);border-right:1px solid var(--b);padding:12px}main{flex:1;padding:18px}.si{display:flex;justify-content:space-between;padding:10px;border-left:3px solid transparent;color:#bad3e4;cursor:pointer}.si.active{border-left-color:var(--a);background:rgba(255,255,255,.04)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}.stat,.card{background:rgba(8,21,34,.94);border:1px solid var(--b);border-radius:14px;padding:18px}.stat small,.ey{color:var(--m);letter-spacing:.16em;font-size:11px;text-transform:uppercase}.stat strong{display:block;color:var(--a);font-size:34px;margin:8px 0}.stat span{color:#9fb8c8}.hero h1{font-size:42px;margin:8px 0;color:#fff}.hero p{color:#bad3e4;line-height:1.6}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:14px 0}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
input,textarea{width:100%;background:#050b12;color:#dff7ff;border:1px solid var(--b);border-radius:10px;padding:12px;margin:8px 0;font-family:monospace}textarea{min-height:130px}
button.primary{background:var(--a);color:#001;border:0;border-radius:10px;padding:11px 14px;font-weight:900;cursor:pointer}.out,pre.box{white-space:pre-wrap;background:#050b12;border:1px solid rgba(0,255,198,.18);border-left:3px solid var(--a);padding:14px;border-radius:10px;margin-top:12px;line-height:1.5;color:#dff7ff}.out{display:none}
@media(max-width:900px){#app{display:block}aside{width:auto;min-height:auto}.kpis,.grid4,.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<script src="/bpo/js/bpo-ops-cloud.js?v=groq1"></script>
<script src="/bpo/js/bpo-vertical-app.js?v=groq1"></script>
<script src="/bpo/js/bpo-ops-enhance.js?v=ops1"></script>
<script src="/bpo/js/bpo-experience-upgrade.js?v=exp2"></script>
</body>
</html>
