<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TSM Music Command - Live Engine</title>
    <style>
        :root { --bg: #070a13; --panel: #0f172a; --pink: #ec4899; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 30px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 600px; background: var(--panel); border-radius: 12px; padding: 24px; border: 1px solid #1e293b; }
        .row { margin: 12px 0; opacity: 0.2; transition: opacity 0.3s; padding-left: 8px; }
        .row.active { opacity: 1; border-left: 3px solid var(--pink); padding-left: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>Scottsdale Payback (Failproof Synth Engine)</h2>
            <button id="btn" onclick="toggle()" style="background:var(--pink); color:#fff; border:none; padding:12px 24px; font-weight:bold; border-radius:6px; cursor:pointer;">START REPLAY</button>
        </div>
        <div id="viewport" style="background:#020617; padding:20px; border-radius:8px; height:200px; overflow-y:auto;">
            <div class="row" id="l1">(Yeah... uh huh...) [Look!]</div>
            <div class="row" id="l2">New condo in Scottsdale, pajama party goin up!</div>
            <div class="row" id="l3">Heard my ex was outside flexin, now he's outta luck.</div>
            <div class="row" id="l4" style="color:var(--pink);">FROM RAGS TO RICHES, RUNNIN CIRCLES ROUND BITCHES!</div>
        </div>
    </div>
    <script>
        let playing = false, step = 0, interval, audioCtx, beatInterval;
        
        function playTone(freq, type, duration, vol) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function toggle() {
            const btn = document.getElementById('btn');
            if (playing) {
                clearInterval(interval); clearInterval(beatInterval);
                if(audioCtx) audioCtx.close(); audioCtx = null;
                btn.innerText = "START REPLAY"; playing = false;
            } else {
                playing = true; btn.innerText = "STOP AUDIO";
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // 150 BPM Electronic Synth Backing Loop
                beatInterval = setInterval(() => {
                    playTone(60, 'sine', 0.3, 0.4); // Deep Kick
                    setTimeout(() => playTone(200, 'triangle', 0.1, 0.15), 200); // Percussion
                }, 400);

                startLyrics();
            }
        }

        function startLyrics() {
            for(let i=1; i<=4; i++) document.getElementById('l'+i).classList.remove('active');
            step = 1; document.getElementById('l'+step).classList.add('active');
            interval = setInterval(() => {
                document.getElementById('l'+step).classList.remove('active');
                step++; 
                if(step > 4) { 
                    clearInterval(interval); clearInterval(beatInterval);
                    if(audioCtx) audioCtx.close(); audioCtx = null;
                    document.getElementById('btn').innerText = "START REPLAY"; playing = false; return; 
                }
                document.getElementById('l'+step).classList.add('active');
            }, 3800);
        }
    </script>
</body>
</html>
