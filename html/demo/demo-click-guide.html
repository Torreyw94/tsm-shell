<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSMatter · Demo Click Guide · HonorHealth & Dignity Health</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@500;700&display=swap" rel="stylesheet">
<style>
/* TSM_SCROLL_FIX */
html, body {
  height: 100%;
  overflow-y: auto;
}
main {
  padding-bottom: 80px !important;
  min-height: calc(100vh - 60px);
}
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 32px;
  z-index: 10;
}
.ask-bar {
  position: fixed;
  bottom: 40px;
  right: 12px;
  z-index: 20;
}
.panel {
  max-height: 60vh;
  overflow-y: auto;
}

:root {
  --bg: #f8f7f4; --surface: #ffffff; --surface2: #f2f1ee;
  --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.15);
  --text: #1a1a18; --text2: #5a5a56; --text3: #8a8a84;
  --hh: #0F6E56; --hh-light: #e6f5f0; --hh-mid: #1D9E75; --hh-border: #5DCAA5;
  --dh: #185FA5; --dh-light: #e8f1fb; --dh-mid: #378ADD; --dh-border: #85B7EB;
  --warn: #BA7517; --warn-light: #fef3e2; --warn-border: #EF9F27;
  --danger: #A32D2D; --danger-light: #fef0f0; --danger-border: #F09595;
  --neutral: #5F5E5A; --neutral-light: #f2f1ee;
  --radius: 10px; --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 24px; display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 100;
}
.site-logo {
  font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--text);
}
.site-logo span { color: var(--hh-mid); }
.site-badge {
  font-size: 10px; padding: 3px 8px; border-radius: 20px;
  background: var(--hh-light); color: var(--hh); letter-spacing: .06em;
}
.header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.hdr-date { font-size: 11px; color: var(--text3); }

/* ── LAYOUT ── */
.wrap { max-width: 860px; margin: 0 auto; padding: 24px 20px 48px; }

/* ── ORG TABS ── */
.org-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.org-tab {
  padding: 14px 18px; border-radius: var(--radius);
  border: 1.5px solid var(--border); cursor: pointer;
  background: var(--surface); transition: all .15s;
}
.org-tab:hover { border-color: var(--border2); }
.org-tab.active-hh { border-color: var(--hh-border); background: var(--hh-light); }
.org-tab.active-dh { border-color: var(--dh-border); background: var(--dh-light); }
.org-day { font-size: 10px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 3px; }
.org-name { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
.org-tab.active-hh .org-name { color: var(--hh); }
.org-tab.active-dh .org-name { color: var(--dh); }
.org-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ── PROGRESS ── */
.progress-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 20px; }
.prog-step {
  flex: 1; height: 4px; border-radius: 2px; cursor: pointer;
  background: var(--border2); transition: background .2s;
}
.prog-step.done-hh { background: var(--hh-mid); }
.prog-step.done-dh { background: var(--dh-mid); }
.prog-step.active-hh { background: var(--hh-border); }
.prog-step.active-dh { background: var(--dh-border); }
.prog-label { font-size: 11px; color: var(--text3); white-space: nowrap; min-width: 60px; text-align: right; }

/* ── STEP CARD ── */
.step-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 12px;
}
.step-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 18px; border-bottom: 1px solid var(--border);
}
.step-num {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.step-num-hh { background: var(--hh-light); color: var(--hh); }
.step-num-dh { background: var(--dh-light); color: var(--dh); }
.step-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); flex: 1; }
.step-timing {
  font-size: 10px; padding: 3px 9px; border-radius: 20px;
  background: var(--neutral-light); color: var(--neutral); white-space: nowrap;
}
.step-body { padding: 18px; display: flex; flex-direction: column; gap: 14px; }

/* ── PHASE PILL ── */
.phase-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
}
.phase-open { background: var(--danger-light); color: var(--danger); }
.phase-demo-hh { background: var(--hh-light); color: var(--hh); }
.phase-demo-dh { background: var(--dh-light); color: var(--dh); }
.phase-close { background: var(--neutral-light); color: var(--neutral); }

/* ── SAY BLOCK ── */
.say-block {
  border-left: 3px solid var(--hh-mid); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  background: var(--hh-light); padding: 13px 15px;
}
.say-block.dh { border-left-color: var(--dh-mid); background: var(--dh-light); }
.say-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; margin-bottom: 8px; color: var(--hh);
}
.say-label.dh { color: var(--dh); }
.say-text { font-size: 13px; line-height: 1.7; color: var(--text); white-space: pre-wrap; }

/* ── CLICK BLOCK ── */
.click-block {
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 13px 15px; border: 1px solid var(--border);
}
.click-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; margin-bottom: 10px; color: var(--neutral);
}
.click-item {
  display: flex; align-items: flex-start; gap: 8px;
  margin-bottom: 8px; font-size: 12px; color: var(--text); line-height: 1.5;
}
.click-item:last-child { margin-bottom: 0; }
.click-arrow { color: var(--text3); flex-shrink: 0; }
.click-key {
  display: inline-flex; padding: 2px 8px;
  border: 1px solid var(--border2); border-radius: 4px;
  font-size: 11px; font-weight: 700; background: var(--surface);
  color: var(--text); white-space: nowrap; flex-shrink: 0; font-family: 'JetBrains Mono', monospace;
}
.click-desc { color: var(--text2); }

/* ── BNCA BLOCK ── */
.bnca-block {
  border: 1px solid var(--border2); border-radius: var(--radius-sm); overflow: hidden;
}
.bnca-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 13px; background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--text3);
}
.bnca-live { display: flex; align-items: center; gap: 5px; }
.bnca-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--hh-mid); }
.bnca-dot.dh { background: var(--dh-mid); }
.bnca-grid { display: grid; grid-template-columns: 1fr 1fr; }
.bnca-cell { padding: 11px 13px; border-bottom: 1px solid var(--border); }
.bnca-cell:nth-child(odd) { border-right: 1px solid var(--border); }
.bnca-cell:nth-last-child(-n+2) { border-bottom: none; }
.bnca-cell-label { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: 4px; }
.bnca-cell-val { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.4; }
.val-danger { color: var(--danger); }
.val-warn { color: var(--warn); }
.val-hh { color: var(--hh); }
.val-dh { color: var(--dh); }

/* ── TIP BLOCK ── */
.tip-block {
  border: 1px solid var(--warn-border); border-radius: var(--radius-sm);
  background: var(--warn-light); padding: 11px 13px;
}
.tip-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; color: var(--warn); margin-bottom: 5px;
}
.tip-text { font-size: 12px; color: var(--text); line-height: 1.6; }

/* ── NAV ── */
.nav-row { display: flex; gap: 8px; margin-top: 4px; }
.nav-btn {
  padding: 10px 20px; border-radius: var(--radius-sm);
  border: 1px solid var(--border2); background: var(--surface);
  cursor: pointer; font-size: 12px; font-weight: 700;
  color: var(--text); font-family: 'JetBrains Mono', monospace;
  transition: all .12s; letter-spacing: .04em;
}
.nav-btn:hover { background: var(--surface2); }
.nav-btn.primary-hh { background: var(--hh); border-color: var(--hh); color: #fff; }
.nav-btn.primary-hh:hover { background: var(--hh-mid); }
.nav-btn.primary-dh { background: var(--dh); border-color: var(--dh); color: #fff; }
.nav-btn.primary-dh:hover { opacity: .9; }
.nav-btn:disabled { opacity: .3; cursor: not-allowed; }
.nav-spacer { flex: 1; }

/* ── FOOTER ── */
.site-footer {
  border-top: 1px solid var(--border); padding: 16px 24px;
  display: flex; align-items: center; gap: 12px;
  font-size: 10px; color: var(--text3); background: var(--surface);
}
.footer-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--hh-mid); }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-logo">TSM<span>atter</span></div>
  <div class="site-badge">Demo Script · Internal Use</div>
  <div class="header-right">
    <div class="hdr-date" id="hdr-date"></div>
  </div>
</header>

<div class="wrap">
  <div class="org-tabs">
    <div class="org-tab active-hh" id="tab-hh" onclick="switchOrg('hh')">
      <div class="org-day">Thursday</div>
      <div class="org-name">HonorHealth</div>
      <div class="org-sub">Revenue Cycle · Dee Montee · 8-step script</div>
    </div>
    <div class="org-tab" id="tab-dh" onclick="switchOrg('dh')">
      <div class="org-day">Friday</div>
      <div class="org-name">Dignity Health</div>
      <div class="org-sub">Multi-site Operations · CFO Layer · 7-step script</div>
    </div>
  </div>

  <div class="progress-wrap" id="prog-bar"></div>
  <div id="step-container"></div>

  <div class="nav-row">
    <button class="nav-btn" id="btn-prev" onclick="prevStep()">← Back</button>
    <button class="nav-btn" id="btn-next" onclick="nextStep()">Next step →</button>
    <div class="nav-spacer"></div>
    <button class="nav-btn" onclick="jumpTo(0)">↺ Restart</button>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-dot"></div>
  TSMatter · Demo Click Guide · HonorHealth + Dignity Health
  <div class="footer-dot"></div>
  HC Strategist · BNCA Engine · Confidential
  <div class="footer-dot"></div>
  <span id="ft-date"></span>
</footer>

<script>
let org = 'hh', step = 0;

const HH = [
  {
    title: "Open with the pain — before you touch the screen",
    timing: "0–2 min", phase: "open",
    say: `"Dee, before I show you anything — what's your denial rate right now, and what did you do about it this morning?"\n\n[Pause. Let her answer.]\n\n"That's exactly why we built this. Every morning your team wakes up to 231 denied claims, an 18.4% denial rate already above the CMS 15% threshold — and the day starts with no clear answer about what to do first. We fix that."`,
    clicks: [],
    bnca: null,
    tip: "Do NOT open the laptop yet. Make eye contact. The pause after the first question is intentional — it surfaces her real pain before you position anything."
  },
  {
    title: "Pull up the HC Strategist — Context Lock moment",
    timing: "2–4 min", phase: "demo",
    say: `"Let me show you what your morning looks like when this is running. This is your command center — but notice what it is NOT. It's not a federation dashboard. It's not AI for everything. It's locked to HonorHealth. Healthcare only. Your offices only. Nothing bleeds in from legal, mortgage, or construction."\n\n[Point to the Context Lock bar.]\n\n"See this green bar at the top? Company: HonorHealth. Sector: Healthcare. Cross-sector bleed: OFF. This system only knows about you."`,
    clicks: [
      { key: "Open honor-portal/nu-index.html", desc: "Navigate to the HonorHealth OPS Portal" },
      { key: "Context Lock bar", desc: "Point to the green bar — read each field aloud" },
      { key: "HC Nodes row", desc: "Gesture at 10/10 nodes online, 4/4 offices reporting" }
    ],
    bnca: null,
    tip: "This is your differentiation moment. Other tools show a federation. You show a profile. Dee doesn't care about 12 verticals — she cares that it's HERS."
  },
  {
    title: "Show the KPIs — her revenue, her risk, her offices",
    timing: "4–6 min", phase: "demo",
    say: `"These aren't generic metrics. Every number maps directly to a real HonorHealth claim, a real office, a real dollar. Denial Hotspot: 18.4% — that's your number. Revenue at Risk: $48K — that's your exposure today. Auth Delays: 65 — that's your United Healthcare bottleneck at Scottsdale.\n\nAnd this last card — the Strategist Score — the system just calculated your revenue cycle health. We're going to use that in a minute."`,
    clicks: [
      { key: "KPI row", desc: "Walk left to right — deny rate, revenue at risk, auth delays, strategist score" },
      { key: "Sub-label on each KPI", desc: "Read the sub-label aloud for each card" }
    ],
    bnca: {
      label: "HonorHealth · Live dashboard snapshot", isDh: false,
      cells: [
        { label: "HC Nodes", val: "10/10 online", cls: "val-hh" },
        { label: "Denial Hotspot", val: "18.4% — CMS breach", cls: "val-danger" },
        { label: "Revenue at Risk", val: "$48K · 231 claims", cls: "val-danger" },
        { label: "Auth Delays", val: "65 across 4 offices", cls: "val-warn" }
      ]
    },
    tip: "Slow down here. Dee has probably never seen her KPIs arranged this cleanly. Let the numbers land before moving on."
  },
  {
    title: "Run the Pull Revenue Pack — live BNCA output",
    timing: "6–10 min", phase: "demo",
    say: `"Now watch what happens when I press one button. I'm pulling your Revenue Pack — billing, insurance, compliance, and all four satellite office summaries — and the system synthesizes a single answer."\n\n[Click. Wait for the AI output.]\n\n"This is BNCA — Best Next Course of Action. It's not a report. It's not a dashboard. It's an answer. Top issue, which office or node it came from, dollar impact, and exactly three things your team should do first — ranked by recovery value.\n\nYou don't have to guess. You don't have to run a meeting. You just read this and act."`,
    clicks: [
      { key: "Pull Revenue Pack button", desc: "Click the pull pack button — wait for synthesis to complete" },
      { key: "BNCA output panel", desc: "Point to top issue, dollar amount, 3 actions, which office moves first" }
    ],
    bnca: {
      label: "BNCA output · HonorHealth Revenue Pack", isDh: false,
      cells: [
        { label: "Top Issue", val: "PR-96 denial surge · Mesa + Scottsdale", cls: "val-danger" },
        { label: "Dollar Impact", val: "$21,600 recoverable", cls: "val-warn" },
        { label: "First Action", val: "File CO-29 appeal · CLM-0334 · 48hr", cls: "val-danger" },
        { label: "Who Acts First", val: "Mesa OM + HC-Billing node", cls: "" }
      ]
    },
    tip: "This is your close moment. If she leans forward here — she's sold. The BNCA output IS the product. Don't explain the tech. Just let her read it."
  },
  {
    title: "Show the Satellite Office Summaries — the 'nervous system' moment",
    timing: "10–13 min", phase: "demo",
    say: `"Now I want to show you something that makes this more than a billing tool. Click over to Satellite Offices."\n\n[Click tab.]\n\n"You have four offices. Mesa is critical right now — 22.1% denial rate, highest in your portfolio, $11.2K writeoff risk. Scottsdale has 31 auth approvals stuck in the United Healthcare queue. Tempe is actually your best performer — 11.2% — and the system flagged what they're doing differently.\n\nThis isn't a report someone ran last Tuesday. This updated 47 minutes ago. Every office manager in your network is feeding this summary automatically."`,
    clicks: [
      { key: "Satellite Offices tab", desc: "Click the tab in the center nav bar" },
      { key: "Mesa card", desc: "Point to the red critical badge — 22.1%, $11.2K risk" },
      { key: "Tempe card", desc: "Point to the green best-practice card" },
      { key: "Deep Dive Mesa button", desc: "Click — let AI analyze the Mesa situation live" }
    ],
    bnca: null,
    tip: "The 'updated 47 minutes ago' detail is powerful. Say it with confidence. It signals live data, not stale reports. If she asks how — say: 'each OM publishes a structured summary upward automatically.'"
  },
  {
    title: "Do the Quick Ask — 'give me your biggest issue'",
    timing: "13–16 min", phase: "demo",
    say: `"Dee, I want to try something. Tell me your single biggest headache right now. Whatever it is — denials, an auth that's stuck, a coder issue, the board meeting Friday."\n\n[Type her answer into the chat panel or Quick Ask.]\n\n"Watch — I'm going to run that against your entire HC mesh right now. Not a generic search. Your mesh. Your data. Your answer."\n\n[Show the output.]\n\n"That took under 60 seconds. That's what your team gets every morning instead of a status meeting."`,
    clicks: [
      { key: "HC Neural Assistant chat (right panel)", desc: "Type her exact words into the chat input" },
      { key: "Quick Asks row", desc: "If she mentions denials — click 'Denial Reduction Plan'" },
      { key: "Draft CO-29 Appeal", desc: "If she mentions CLM-0334 — click this and show the letter output" }
    ],
    bnca: null,
    tip: "This is the most powerful moment of the demo. The buyer becomes a participant. Her words go in. A real answer comes out. Never skip this step."
  },
  {
    title: "Show the HC Strategist tab — full strategy engine",
    timing: "16–19 min", phase: "demo",
    say: `"If you want to go deeper — say it's Monday morning and you need a full denial recovery plan — you open the HC Strategist. You pick a mode. We have: priority action plan, denial root cause, revenue recovery, compliance risk, payer-specific tactics, and board talking points.\n\nYou hit run. In under 60 seconds you have a complete strategy — sourced from your HC mesh only, locked to HonorHealth, no cross-contamination from other clients or verticals."`,
    clicks: [
      { key: "HC Strategist tab", desc: "Click the purple tab in the navigation bar" },
      { key: "Analysis Mode dropdown", desc: "Show the 8 mode options — narrate each one briefly" },
      { key: "Run HC Analysis button", desc: "Select 'Denial Rate Root Cause' — run it live" }
    ],
    bnca: null,
    tip: "Don't show all 8 modes in depth. Name them quickly, then run ONE that matches her stated problem. Speed matters more than comprehensiveness here."
  },
  {
    title: "Close — deploy framing + next step",
    timing: "19–22 min", phase: "close",
    say: `"Dee, here's what I want you to walk away with. This isn't a tool your team has to learn. This is a system that tells them what to do.\n\nWe can deploy this in your office in 48 hours. Not a 6-month implementation. Not a training program. 48 hours, and your team wakes up Monday morning with a BNCA waiting for them — top issue, three actions, which office moves first.\n\nHere's what I'm proposing: a 90-day engagement. Single site to start — Scottsdale or wherever your sharpest pain is. We track denial rate reduction, revenue recovered, and auth clearance time. You see the ROI in writing before day 30.\n\nWhat would it mean to your practice if your denial rate dropped below 15% in the next 90 days?"`,
    clicks: [],
    bnca: null,
    tip: "End with the ROI question — not 'any questions?' The ROI question forces her to calculate the value herself. That calculation is more persuasive than anything you can say."
  }
];

const DH = [
  {
    title: "Open with the scale pain — before the screen",
    timing: "0–2 min", phase: "open",
    say: `"Before I show you anything — when you look across your network right now, do you know which site is your highest denial risk? Do you know which payer is blocking the most revenue? Do you know this morning, not from last month's report?\n\n[Pause.]\n\nMost multi-site systems don't. Data sits in silos. Reporting runs weekly. By the time you know there's a problem, you've already lost the recovery window. We built something different."`,
    clicks: [],
    bnca: null,
    tip: "Dignity Health is a larger organization — this buyer is CFO or VP layer. They care about network-level visibility and recovery velocity, not individual claim appeals. Lead with that."
  },
  {
    title: "Pull up the Strategist — positioned as a network intelligence layer",
    timing: "2–5 min", phase: "demo",
    say: `"What you're looking at is your healthcare operating intelligence layer. Every site in your network publishes a structured summary upward — automatically, every hour. The Strategist ingests those summaries and produces one answer: here is what is happening across your network right now, and here is what to do next.\n\nThis is not a dashboard you report from. This is a decision system you act from."`,
    clicks: [
      { key: "Open strategist/nu-index.html", desc: "Navigate to the HC Strategist" },
      { key: "Context Lock bar", desc: "Read aloud: Company, Sector, Mesh, Cross-sector bleed: OFF" },
      { key: "KPI row", desc: "Point to: HC Nodes Online, Offices Reporting, Denial Hotspot, Revenue at Risk" }
    ],
    bnca: null,
    tip: "For Dignity Health, say 'network-level' in every sentence. They have dozens of sites. The value is aggregation and prioritization across all of them."
  },
  {
    title: "Run the Pull Site Variance Pack — show cross-site intelligence",
    timing: "5–9 min", phase: "demo",
    say: `"Let me show you the most valuable thing we do for a network like yours. I'm pulling your Site Variance Pack."\n\n[Click.]\n\n"The system just compared every site in your network — denial rate, auth backlog, coding drift, writeoff risk — and ranked them. You can see immediately which sites are performing and which are bleeding revenue.\n\nFor Dignity Health, this means your CFO knows by 7am which regional director needs to move today. No calls, no Excel, no waiting for the monthly report."`,
    clicks: [
      { key: "Pull Site Variance button", desc: "Click — wait for the BNCA output to render" },
      { key: "Site Variance tab", desc: "Switch to Site Variance tab after analysis loads" },
      { key: "Comparison table", desc: "Point to highest-risk site vs best-practice site" }
    ],
    bnca: {
      label: "BNCA output · Dignity Health Site Variance Pack", isDh: true,
      cells: [
        { label: "Highest Risk Site", val: "Site D · 24.3% denial rate", cls: "val-danger" },
        { label: "Best Practice Site", val: "Site A · 10.8% · replicate now", cls: "val-dh" },
        { label: "Network Avg Denial", val: "17.9% · above CMS threshold", cls: "val-danger" },
        { label: "Network Revenue at Risk", val: "$340K · 14-day window", cls: "val-warn" }
      ]
    },
    tip: "Use network numbers — $340K is a CFO number, not a single-claim number. Frame it as: 'recoverable revenue your current system cannot see.'"
  },
  {

function steps() { return org === 'hh' ? HH : DH; }
function c() { return org; }

function switchOrg(o) {
  org = o; step = 0;
  document.getElementById('tab-hh').className = 'org-tab' + (o === 'hh' ? ' active-hh' : '');
  document.getElementById('tab-dh').className = 'org-tab' + (o === 'dh' ? ' active-dh' : '');
  render();
}

function nextStep() { if (step < steps().length - 1) { step++; render(); window.scrollTo(0,0); } }
function prevStep() { if (step > 0) { step--; render(); window.scrollTo(0,0); } }
function jumpTo(n) { step = n; render(); window.scrollTo(0,0); }

function render() {
  const ss = steps(), s = ss[step], total = ss.length, col = c();

  // progress
  let ph = '';
  for (let i = 0; i < total; i++) {
    const cls = i < step ? `prog-step done-${col}` : i === step ? `prog-step active-${col}` : 'prog-step';
    ph += `<div class="${cls}" onclick="jumpTo(${i})" title="Step ${i+1}"></div>`;
  }
  ph += `<span class="prog-label">Step ${step+1} / ${total}</span>`;
  document.getElementById('prog-bar').innerHTML = ph;

  // phase pill
  const phaseMap = {
    open: ['Opening — no screen', 'phase-open'],
    demo: ['Live demo', col === 'hh' ? 'phase-demo-hh' : 'phase-demo-dh'],
    close: ['Close', 'phase-close']
  };
  const [phLabel, phCls] = phaseMap[s.phase] || ['Demo', 'phase-demo-hh'];

  // clicks
  const clicksHTML = s.clicks.length ? `
    <div class="click-block">
      <div class="click-label">What to click</div>
      ${s.clicks.map(cl => `
        <div class="click-item">
          <span class="click-arrow">→</span>
          <span class="click-key">${cl.key}</span>
          <span class="click-desc"> — ${cl.desc}</span>
        </div>`).join('')}
    </div>` : '';

  // bnca
  const bncaHTML = s.bnca ? `
    <div class="bnca-block">
      <div class="bnca-header">
        <span>${s.bnca.label}</span>
        <div class="bnca-live"><div class="bnca-dot${s.bnca.isDh ? ' dh' : ''}"></div><span>expected output</span></div>
      </div>
      <div class="bnca-grid">
        ${s.bnca.cells.map(cell => `
          <div class="bnca-cell">
            <div class="bnca-cell-label">${cell.label}</div>
            <div class="bnca-cell-val ${cell.cls}">${cell.val}</div>
          </div>`).join('')}
      </div>
    </div>` : '';

  // tip
  const tipHTML = s.tip ? `
    <div class="tip-block">
      <div class="tip-label">Presenter tip</div>
      <div class="tip-text">${s.tip}</div>
    </div>` : '';

  document.getElementById('step-container').innerHTML = `
    <div class="step-card">
      <div class="step-header">
        <div class="step-num step-num-${col}">${step+1}</div>
        <div class="step-title">${s.title}</div>
        <div class="step-timing">${s.timing}</div>
      </div>
      <div class="step-body">
        <div class="phase-pill ${phCls}">${phLabel}</div>
        <div class="say-block${col === 'dh' ? ' dh' : ''}">
          <div class="say-label${col === 'dh' ? ' dh' : ''}">What to say</div>
          <div class="say-text">${s.say}</div>
        </div>
        ${clicksHTML}
        ${bncaHTML}
        ${tipHTML}
      </div>
    </div>`;

  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  prev.disabled = step === 0;
  next.textContent = step === total - 1 ? '✓ Done' : 'Next step →';
  next.className = `nav-btn primary-${col}`;
  next.disabled = step === total - 1;
}

// dates

const opts = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
const ds = now.toLocaleDateString('en-US', opts);
document.getElementById('hdr-date').textContent = ds;
document.getElementById('ft-date').textContent = ds;

render();
</script>
