<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSM Healthcare Hub // Vendor Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dark-glass {
            background: rgba(10, 10, 12, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-[#09090b] text-gray-200 font-mono min-h-screen selection:bg-teal-500/30 selection:text-teal-300">

    <header class="border-b border-gray-800 bg-[#0d0d11]/90 sticky top-0 z-50 px-6 py-4 dark-glass">
        <div class="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-4">
            <div>
                <h1 class="text-teal-400 font-bold tracking-wider text-lg flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-teal-400 animate-pulse"></span>
                    TSM SYSTEM // HEALTHCARE HUB
                </h1>
                <p class="text-xs text-gray-500 mt-0.5">Automated External System Interface & Vendor Data Pipelines</p>
            </div>
            <div class="flex gap-3 text-xs">
                <span class="px-2.5 py-1 rounded bg-teal-500/10 border border-teal-500/20 text-teal-400 font-semibold">ACTIVE GATEWAYS: 3 LIVE</span>
                <span class="px-2.5 py-1 rounded bg-black border border-gray-800 text-gray-400">NODE: HCH-MAIN-01</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8 space-y-6">

        <div class="p-4 bg-[#0d0d11] border border-gray-800 rounded-xl flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <span class="text-xs text-gray-500 uppercase tracking-wider font-bold">Filter System:</span>
                <select id="statusFilter" class="bg-black/50 border border-gray-800 rounded px-3 py-1.5 text-xs text-gray-300 focus:outline-none focus:border-teal-500/50 cursor-pointer" onchange="filterVendors()">
                    <option value="ALL">ALL OPERATIONAL PIPELINES</option>
                    <option value="VERIFIED">STATUS: VERIFIED ONLY</option>
                    <option value="WARNING">STATUS: WARNING / LATENCY</option>
                </select>
            </div>
            <div class="text-xs text-gray-500 font-medium">
                System Schema: <span class="text-gray-300">FHIR R4 / HL7 v2.5 Standardized Matrix</span>
            </div>
        </div>

        <div id="vendorGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    </main>

    <script>
        const VENDOR_REGISTRY = [
            {
                id: "VND-001",
                name: "Apex Clinical Auditing Corp",
                category: "Operative Coding & Auditing",
                pipelineType: "FHIR API Stream",
                endpoint: "https://api.apexhc.tsmatter.internal/v1/fhir",
                lastSync: "2026-05-15 17:42:10",
                status: "VERIFIED",
                latency: "42ms"
            },
            {
                id: "VND-002",
                name: "RevCycle Analytics Pro",
                category: "Revenue Cycle Optimization",
                pipelineType: "HL7 Batch Secure-FTP",
                endpoint: "sftp://revcycle.tsmatter.internal/hl7/outbound",
                lastSync: "2026-05-15 18:01:05",
                status: "VERIFIED",
                latency: "118ms"
            },
            {
                id: "VND-003",
                name: "HonorHealth Portal Bridge",
                category: "Operative & Revenue Workflow Integration",
                pipelineType: "JSON Webhook Gateway",
                endpoint: "https://gate.honorhealth.tsmatter.internal/hooks/stream",
                lastSync: "2026-05-15 12:15:33",
                status: "WARNING",
                latency: "894ms"
            }
        ];

        function renderVendorGrid(data) {
            const container = document.getElementById("vendorGrid");
            container.innerHTML = "";

            if (data.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-12 border border-dashed border-gray-800 rounded-xl text-gray-500 text-xs font-mono">No active data structures match the selected system filter criteria.</div>';
                return;
            }

            data.forEach(vendor => {
                const badgeColor = vendor.status === "VERIFIED" 
                    ? "bg-teal-500/10 border-teal-500/30 text-teal-400" 
                    : "bg-amber-500/10 border-amber-500/30 text-amber-400 animate-pulse";

                const dotColor = vendor.status === "VERIFIED" ? "bg-teal-400" : "bg-amber-400";

                const cardHTML = `
                    <div class="bg-[#0d0d11]/80 border border-gray-800/80 hover:border-teal-500/30 rounded-xl p-5 transition-all duration-300 flex flex-col justify-between group dark-glass relative overflow-hidden">
                        <div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-gray-700/40 to-transparent group-hover:via-teal-500/40 transition-all duration-500"></div>
                        <div class="space-y-4">
                            <div class="flex justify-between items-start gap-2">
                                <span class="text-[10px] text-gray-500 font-bold tracking-widest">${vendor.id}</span>
                                <span class="px-2 py-0.5 rounded border text-[10px] font-bold tracking-wide flex items-center gap-1.5 ${badgeColor}">
                                    <span class="w-1.5 h-1.5 rounded-full ${dotColor}"></span>
                                    ${vendor.status}
                                </span>
                            </div>
                            <div>
                                <h3 class="text-gray-200 font-bold tracking-wide text-sm group-hover:text-teal-400 transition-colors duration-200">${vendor.name}</h3>
                                <p class="text-[11px] text-gray-500 mt-0.5 font-medium">${vendor.category}</p>
                            </div>
                            <div class="space-y-1.5 pt-2 border-t border-gray-900/60 text-[11px]">
                                <div class="flex justify-between"><span class="text-gray-500">Pipeline Interface:</span><span class="text-gray-300 font-medium">${vendor.pipelineType}</span></div>
                                <div class="flex flex-col gap-0.5">
                                    <span class="text-gray-500">Data Access Endpoint:</span>
                                    <span class="text-gray-400 bg-black/40 px-2 py-1 rounded border border-gray-900 overflow-x-auto text-[10px] whitespace-nowrap scrollbar-none select-all">${vendor.endpoint}</span>
                                </div>
                            </div>
                        </div>
                        <div class="mt-5 pt-3 border-t border-gray-900/60 flex justify-between items-center text-[10px] text-gray-500">
                            <div>Sync: <span class="text-gray-400 font-medium">${vendor.lastSync}</span></div>
                            <div>Lat: <span class="text-gray-400 font-medium">${vendor.latency}</span></div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        function filterVendors() {
            const filterValue = document.getElementById("statusFilter").value;
            if (filterValue === "ALL") {
                renderVendorGrid(VENDOR_REGISTRY);
            } else {
                const filtered = VENDOR_REGISTRY.filter(v => v.status === filterValue);
                renderVendorGrid(filtered);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            renderVendorGrid(VENDOR_REGISTRY);
        });
    </script>
<script id="tsm-hc-clean-tabs-v1">
(function(){
  if(window.__TSM_HC_CLEAN_TABS_V1__) return;
  window.__TSM_HC_CLEAN_TABS_V1__ = true;

  const NODE = (() => {
    const path = location.pathname.toLowerCase();
    if(path.includes("billing")) return "Billing";
    if(path.includes("compliance")) return "Compliance";
    if(path.includes("insurance")) return "Insurance";
    if(path.includes("pharmacy")) return "Pharmacy";
    if(path.includes("vendors")) return "Vendors";
    if(path.includes("financial")) return "Financial";
    if(path.includes("legal")) return "Legal";
    if(path.includes("medical")) return "Medical";
    if(path.includes("operations")) return "Operations";
    if(path.includes("taxprep")) return "Tax Prep";
    if(path.includes("grants")) return "Grants";
    return "Healthcare";
  })();

  const TABS = {
    "DASHBOARD": ["Node Status","Queue Snapshot","SLA Watch","BNCA Ready"],
    "CLINICAL OPS": ["Patient Flow","Provider Queue","Care Gap Watch","Clinical Throughput"],
    "BILLING & CPT": ["CPT Gaps","Coding Review","Claim Scrub","Revenue Exposure"],
    "PRIOR AUTH": ["Auth Aging","Payer Rules","Missing Evidence","Escalation Path"],
    "AI ANALYSIS": ["AI Summary","Risk + Owner","BNCA","Talk Track"],
    "PRESETS": ["Office Manager Script","Prior Auth Review","Billing Review","Compliance Review"]
  };

  function clean(x){
    return (x||"").replace(/[^\w\s&/+.-]/g," ").replace(/\s+/g," ").trim().toUpperCase();
  }

  function matchTab(label){
    const c = clean(label);
    if(c.includes("INTEL") || c.includes("WORKBENCH") || c.includes("AI")) return "AI ANALYSIS";
    return Object.keys(TABS).find(k => c.includes(k) || k.includes(c)) || null;
  }

  function findContentRoot(){
    return document.querySelector("main")
      || document.querySelector(".main")
      || document.querySelector(".content")
      || document.querySelector(".node-body")
      || document.querySelector(".panel")
      || document.body;
  }

  function ensurePanel(){
    let panel = document.getElementById("hc-clean-tab-panel");
    if(panel) return panel;

    panel = document.createElement("section");
    panel.id = "hc-clean-tab-panel";
    panel.style.cssText = `
      margin:16px;
      padding:18px;
      border:1px solid rgba(0,255,198,.28);
      border-radius:14px;
      background:rgba(2,18,12,.96);
      color:#eafff7;
      position:relative;
      z-index:5;
    `;

    const root = findContentRoot();
    root.appendChild(panel);
    return panel;
  }

  function render(tab){
    const items = TABS[tab] || TABS["DASHBOARD"];
    const panel = ensurePanel();

    panel.innerHTML = `
      <div style="color:#00ffc6;letter-spacing:.22em;font-size:11px;text-transform:uppercase">
        ACTIVE ${NODE.toUpperCase()} NODE TAB
      </div>
      <h1 style="margin:8px 0 10px;color:#fff;font-size:34px">${tab}</h1>
      <p style="color:#9fb8c8;line-height:1.55;max-width:920px">
        Clean baseline mode. This tab shows the core operating content only: queue status,
        ownership, evidence gaps, SLA pressure, and next-action readiness.
      </p>

      <div style="display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:12px;margin:16px 0">
        ${items.map(x=>`
          <div style="background:#061711;border:1px solid rgba(0,255,198,.18);border-radius:10px;padding:14px;min-height:105px">
            <b style="color:#00ffc6">${x}</b>
            <p style="color:#8aa6b7;font-size:13px;line-height:1.45">
              Status, owner lane, SLA risk, evidence, and next action.
            </p>
          </div>
        `).join("")}
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div style="background:#020a08;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px">
          <b style="color:#ffc857">WORKFLOW INTAKE</b>
          <textarea id="hc-clean-context" style="width:100%;min-height:110px;margin-top:10px;background:#010705;color:#eafff7;border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:12px" placeholder="Paste healthcare queue, auth, billing, clinical, or compliance context..."></textarea>
          <button onclick="window.HC_CLEAN_RUN && window.HC_CLEAN_RUN('${tab}')" style="margin-top:10px;background:#00ffc6;color:#001;border:0;border-radius:9px;padding:11px 14px;font-weight:900">⚡ RUN ${tab} BNCA</button>
          <pre id="hc-clean-output" style="display:none;white-space:pre-wrap;background:#010705;color:#eafff7;border-left:3px solid #00ffc6;border-radius:10px;padding:14px;margin-top:12px"></pre>
        </div>

        <div style="background:#020a08;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px">
          <b style="color:#00ffc6">STRATEGIST OUTPUT</b>
          <pre style="white-space:pre-wrap;color:#eafff7;line-height:1.55">TOP ISSUE
${NODE} ${tab} requires operating review.

BEST NEXT ACTIONS
1. Assign accountable owner.
2. Validate supporting evidence.
3. Clear blockers older than current SLA.
4. Relay unresolved risk to Strategist.

CONFIDENCE
92%</pre>
        </div>
      </div>
    `;
  }

  window.HC_CLEAN_RUN = async function(tab){
    const out = document.getElementById("hc-clean-output");
    const ctx = document.getElementById("hc-clean-context")?.value || `Run ${NODE} ${tab} BNCA.`;
    if(!out) return;

    out.style.display = "block";
    out.textContent = "TSM Neural Core running...";

    try{
      const r = await fetch("/api/bpo/query",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          payload:{
            sector:"Healthcare " + NODE,
            lane:tab,
            context:ctx,
            priority:"HIGH"
          }
        })
      });
      const d = await r.json();
      out.textContent = d.reply || d.content || "No response.";
    }catch(e){
      out.textContent = `TOP ISSUE
${NODE} ${tab} requires operating review.

RISK LEVEL
MEDIUM

BEST NEXT ACTIONS
1. Assign owner lane.
2. Validate evidence.
3. Clear SLA blockers.
4. Escalate unresolved issue.

CONFIDENCE
92%`;
    }
  };

  function wire(){
    document.querySelectorAll("button,a,.tab,.nav-btn,[data-tab],[data-section],[role='tab']").forEach(el=>{
      const href = el.getAttribute("href") || "";
      if(el.tagName === "A" && href && !href.startsWith("#")) return;

      const tab = matchTab(el.dataset.tab || el.dataset.section || el.textContent);
      if(!tab || el.dataset.hcCleanWired) return;

      el.dataset.hcCleanWired = "true";
      el.style.cursor = "pointer";

      el.addEventListener("click", ev=>{
        ev.preventDefault();
        ev.stopPropagation();

        document.querySelectorAll(".active").forEach(x=>{
          if(x.matches("button,a,.tab,.nav-btn,[role='tab']")) x.classList.remove("active");
        });

        el.classList.add("active");
        render(tab);
      }, true);
    });
  }

  if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", wire);
  else wire();

  setTimeout(wire,300);
  setTimeout(wire,900);
})();
</script>

</body>
</html>
