<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HC Vendors · TSM</title>
<link rel="stylesheet" href="/healthcare/library-style.css">
</head>
<body>
<h2 style="color:#ff7a00;font-family:monospace;padding:14px">VENDORS NODE</h2>
<div id="node-tabs" data-tab-ai="true">
  <div class="tab active" data-tab="overview" data-node="vendors">Overview</div>
  <div class="tab" data-tab="queue">Queue</div>
  <div class="tab" data-tab="ai">AI Synthesis</div>
</div>
<div class="tab-content" id="tab-overview">LabCorp SLA breach. 3 contracts up for renewal. ROI review pending.</div>
<div class="tab-content" id="tab-queue" style="display:none">Vendor SLA breach — LabCorp. Contract renewal — 3 due. ROI review — 2 vendors. Supply chain — 1 flag.</div>
<div class="tab-content" id="tab-ai" style="display:none">
  <div id="ai-output-vendors">Click Generate for BNCA synthesis.</div>
  <button onclick="generateNodeNarrative('vendors')">⚡ GENERATE</button>
</div>
<script src="/healthcare/js/hc-node-tab-controller.js?v=force3" defer></script>
<script src="/healthcare/js/hc-universal-tab-ai.js?v=hc-universal-fix" defer></script>


<script id="tsm-hc-clean-tabs-v1">
(function(){
  if(window.__TSM_HC_CLEAN_TABS_V1__) return;
  window.__TSM_HC_CLEAN_TABS_V1__ = true;

  const NODE = (() => {
    const path = location.pathname.toLowerCase();
    if(path.includes("billing")) return "Billing";
    if(path.includes("compliance")) return "Compliance";
    if(path.includes("insurance")) return "Insurance";
    if(path.includes("pharmacy")) return "Pharmacy";
    if(path.includes("vendors")) return "Vendors";
    if(path.includes("financial")) return "Financial";
    if(path.includes("legal")) return "Legal";
    if(path.includes("medical")) return "Medical";
    if(path.includes("operations")) return "Operations";
    if(path.includes("taxprep")) return "Tax Prep";
    if(path.includes("grants")) return "Grants";
    return "Healthcare";
  })();

  const TABS = {
    "DASHBOARD": ["Node Status","Queue Snapshot","SLA Watch","BNCA Ready"],
    "CLINICAL OPS": ["Patient Flow","Provider Queue","Care Gap Watch","Clinical Throughput"],
    "BILLING & CPT": ["CPT Gaps","Coding Review","Claim Scrub","Revenue Exposure"],
    "PRIOR AUTH": ["Auth Aging","Payer Rules","Missing Evidence","Escalation Path"],
    "AI ANALYSIS": ["AI Summary","Risk + Owner","BNCA","Talk Track"],
    "PRESETS": ["Office Manager Script","Prior Auth Review","Billing Review","Compliance Review"]
  };

  function clean(x){
    return (x||"").replace(/[^\w\s&/+.-]/g," ").replace(/\s+/g," ").trim().toUpperCase();
  }

  function matchTab(label){
    const c = clean(label);
    if(c.includes("INTEL") || c.includes("WORKBENCH") || c.includes("AI")) return "AI ANALYSIS";
    return Object.keys(TABS).find(k => c.includes(k) || k.includes(c)) || null;
  }

  function findContentRoot(){
    return document.querySelector("main")
      || document.querySelector(".main")
      || document.querySelector(".content")
      || document.querySelector(".node-body")
      || document.querySelector(".panel")
      || document.body;
  }

  function ensurePanel(){
    let panel = document.getElementById("hc-clean-tab-panel");
    if(panel) return panel;

    panel = document.createElement("section");
    panel.id = "hc-clean-tab-panel";
    panel.style.cssText = `
      margin:16px;
      padding:18px;
      border:1px solid rgba(0,255,198,.28);
      border-radius:14px;
      background:rgba(2,18,12,.96);
      color:#eafff7;
      position:relative;
      z-index:5;
    `;

    const root = findContentRoot();
    root.appendChild(panel);
    return panel;
  }

  function render(tab){
    const items = TABS[tab] || TABS["DASHBOARD"];
    const panel = ensurePanel();

    panel.innerHTML = `
      <div style="color:#00ffc6;letter-spacing:.22em;font-size:11px;text-transform:uppercase">
        ACTIVE ${NODE.toUpperCase()} NODE TAB
      </div>
      <h1 style="margin:8px 0 10px;color:#fff;font-size:34px">${tab}</h1>
      <p style="color:#9fb8c8;line-height:1.55;max-width:920px">
        Clean baseline mode. This tab shows the core operating content only: queue status,
        ownership, evidence gaps, SLA pressure, and next-action readiness.
      </p>

      <div style="display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:12px;margin:16px 0">
        ${items.map(x=>`
          <div style="background:#061711;border:1px solid rgba(0,255,198,.18);border-radius:10px;padding:14px;min-height:105px">
            <b style="color:#00ffc6">${x}</b>
            <p style="color:#8aa6b7;font-size:13px;line-height:1.45">
              Status, owner lane, SLA risk, evidence, and next action.
            </p>
          </div>
        `).join("")}
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div style="background:#020a08;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px">
          <b style="color:#ffc857">WORKFLOW INTAKE</b>
          <textarea id="hc-clean-context" style="width:100%;min-height:110px;margin-top:10px;background:#010705;color:#eafff7;border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:12px" placeholder="Paste healthcare queue, auth, billing, clinical, or compliance context..."></textarea>
          <button onclick="window.HC_CLEAN_RUN && window.HC_CLEAN_RUN('${tab}')" style="margin-top:10px;background:#00ffc6;color:#001;border:0;border-radius:9px;padding:11px 14px;font-weight:900">⚡ RUN ${tab} BNCA</button>
          <pre id="hc-clean-output" style="display:none;white-space:pre-wrap;background:#010705;color:#eafff7;border-left:3px solid #00ffc6;border-radius:10px;padding:14px;margin-top:12px"></pre>
        </div>

        <div style="background:#020a08;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px">
          <b style="color:#00ffc6">STRATEGIST OUTPUT</b>
          <pre style="white-space:pre-wrap;color:#eafff7;line-height:1.55">TOP ISSUE
${NODE} ${tab} requires operating review.

BEST NEXT ACTIONS
1. Assign accountable owner.
2. Validate supporting evidence.
3. Clear blockers older than current SLA.
4. Relay unresolved risk to Strategist.

CONFIDENCE
92%</pre>
        </div>
      </div>
    `;
  }

  window.HC_CLEAN_RUN = async function(tab){
    const out = document.getElementById("hc-clean-output");
    const ctx = document.getElementById("hc-clean-context")?.value || `Run ${NODE} ${tab} BNCA.`;
    if(!out) return;

    out.style.display = "block";
    out.textContent = "TSM Neural Core running...";

    try{
      const r = await fetch("/api/bpo/query",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          payload:{
            sector:"Healthcare " + NODE,
            lane:tab,
            context:ctx,
            priority:"HIGH"
          }
        })
      });
      const d = await r.json();
      out.textContent = d.reply || d.content || "No response.";
    }catch(e){
      out.textContent = `TOP ISSUE
${NODE} ${tab} requires operating review.

RISK LEVEL
MEDIUM

BEST NEXT ACTIONS
1. Assign owner lane.
2. Validate evidence.
3. Clear SLA blockers.
4. Escalate unresolved issue.

CONFIDENCE
92%`;
    }
  };

  function wire(){
    document.querySelectorAll("button,a,.tab,.nav-btn,[data-tab],[data-section],[role='tab']").forEach(el=>{
      const href = el.getAttribute("href") || "";
      if(el.tagName === "A" && href && !href.startsWith("#")) return;

      const tab = matchTab(el.dataset.tab || el.dataset.section || el.textContent);
      if(!tab || el.dataset.hcCleanWired) return;

      el.dataset.hcCleanWired = "true";
      el.style.cursor = "pointer";

      el.addEventListener("click", ev=>{
        ev.preventDefault();
        ev.stopPropagation();

        document.querySelectorAll(".active").forEach(x=>{
          if(x.matches("button,a,.tab,.nav-btn,[role='tab']")) x.classList.remove("active");
        });

        el.classList.add("active");
        render(tab);
      }, true);
    });
  }

  if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", wire);
  else wire();

  setTimeout(wire,300);
  setTimeout(wire,900);
})();
</script>

</body>
</html>
