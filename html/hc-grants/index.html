<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuditOps | HC-GRANTS</title>
  







<script>
  (function() {
    window.switchTab = function(id, btn) {
      console.log("TSM EXEC:", id);
      // Hide all known tab patterns
      const targets = document.querySelectorAll('[id^="tab-"], [id$="-res"], .tab-content, #dash, #matters, #contracts, #claims, #regulatory');
      targets.forEach(el => el.style.setProperty('display', 'none', 'important'));
      
      // Show target
      const target = document.getElementById(id) || document.getElementById('tab-' + id);
      if (target) {
        target.style.setProperty('display', 'block', 'important');
      }
      
      // Update UI
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
    };

    window.addEventListener('load', () => {
      console.log("TSM: Node Loaded, initializing Dashboard...");
      const dashBtn = document.querySelector('.nav-btn');
      if (dashBtn) {
        const idMatch = dashBtn.getAttribute('onclick')?.match(/'([^']+)'/);
        window.switchTab(idMatch ? idMatch[1] : 'tab-dash', dashBtn);
      }
    });
  })();
</script>
</head><body>




</body></html>
