<html><head><title>Dee Command Center</title></head><body style="background:#050b14;color:#fff; font-family:Arial;padding:20px"><h2>Dee Command Center (Fixed)</h2><button onclick="run('recovery')">Recovery</button><button onclick="run('payer')">Payer</button><button onclick="run('brief')">Brief</button><div id="out" style="margin-top:20px;border:1px solid #00ffa3">loading...</div><script>async function run(type){const out=document.getElementById('out');out.innerHTML='Running '+type;try{const res=await fetch('/api/strategist/hc/dee-action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:'HonorHealth',prompt:type})});const data=await res.json();let output='';if(data.actionDetail&&data.actionDetail.steps){output='<h3>'+data.actionDetail.title+'</h3><ul>'+data.actionDetail.steps.map(s=>'<li>'+s+'</li>').join('')+'</ul>';}else{output='<pre>'+JSON.stringify(data,null,2)+'</pre>';}out.innerHTML=output;}catch(e){out.innerHTML='Error: '+e.message;}}run('recovery');</script></body></html>
