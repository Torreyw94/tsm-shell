<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TSM Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'ui-monospace',SFMono-Regular,Menlo,monospace;background:#0b1120;color:#e5e7eb;display:grid;grid-template-columns:280px 1fr;height:100vh;overflow:hidden}
.sidebar{background:#0d1526;border-right:1px solid #1a2540;display:flex;flex-direction:column;overflow:hidden}
.header{padding:12px 16px;border-bottom:1px solid #1a2540;display:flex;align-items:center;gap:8px}
.logo{font-size:11px;font-weight:800;color:#7dd3fc;letter-spacing:.15em;text-transform:uppercase}
.badge{font-size:9px;padding:2px 6px;background:#7c3aed22;border:1px solid #7c3aed55;border-radius:4px;color:#a78bfa;letter-spacing:.05em}
.search{padding:8px 10px;border-bottom:1px solid #1a2540}
.search input{width:100%;font-size:12px;padding:7px 10px;border:1px solid #1e2d47;border-radius:6px;outline:none;background:#081018;color:#e5e7eb;font-family:inherit}
.search input::placeholder{color:#4b5563}
.sectors{padding:8px 10px;border-bottom:1px solid #1a2540;display:flex;flex-wrap:wrap;gap:4px}
.sector-btn{font-size:10px;padding:3px 8px;border:1px solid #1e2d47;border-radius:4px;background:transparent;color:#6b7280;cursor:pointer;font-family:inherit;transition:all .15s}
.sector-btn:hover{border-color:#334155;color:#94a3b8}
.sector-btn.active{background:#1e3a5f;border-color:#3b82f6;color:#93c5fd}
.count{font-size:10px;color:#4b5563;padding:6px 14px;border-bottom:1px solid #1a2540;display:flex;justify-content:space-between}
.count span{color:#6b7280}
.list{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:#1e2d47 transparent}
.list::-webkit-scrollbar{width:3px}
.list::-webkit-scrollbar-track{background:transparent}
.list::-webkit-scrollbar-thumb{background:#1e2d47;border-radius:2px}
.group-label{padding:8px 14px 4px;font-size:9px;font-weight:700;color:#374151;letter-spacing:.12em;text-transform:uppercase;border-top:1px solid #111d30;margin-top:4px}
.group-label:first-child{border-top:none;margin-top:0}
.item{padding:8px 14px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;color:#9ca3af;border-bottom:1px solid #0e1829;transition:all .12s}
.item:hover{background:#111f35;color:#e5e7eb}
.item.active{background:#1a2e4a;color:#7dd3fc;border-left:2px solid #3b82f6;padding-left:12px}
.dot{width:6px;height:6px;border-radius:50%;background:#1e3a5f;border:1px solid #2563eb44;flex-shrink:0;transition:all .15s}
.item.active .dot{background:#3b82f6;box-shadow:0 0 6px #3b82f680}
.item:hover .dot{background:#1e40af}
.ext-icon{font-size:9px;color:#374151;margin-left:auto;flex-shrink:0}
.item.active .ext-icon{color:#2563eb}
.main{display:flex;flex-direction:column;background:#060d1a}
.bar{padding:8px 14px;border-bottom:1px solid #1a2540;display:flex;align-items:center;gap:6px;background:#0a1628}
.url{flex:1;font-size:11px;padding:7px 10px;border:1px solid #1a2d47;border-radius:6px;background:#060d1a;color:#4b6584;font-family:inherit;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-btn{font-size:11px;padding:7px 11px;border:1px solid #1a2d47;border-radius:6px;background:#0d1a2e;color:#9ca3af;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.bar-btn:hover{background:#162035;color:#e5e7eb;border-color:#2563eb44}
iframe{flex:1;border:none;background:#fff}
.foot{padding:6px 14px;border-top:1px solid #1a2540;font-size:10px;color:#374151;background:#0a1628;display:flex;gap:16px;align-items:center}
.live{color:#22c55e;font-weight:700;letter-spacing:.05em}
#active-label{color:#6b7280}
.empty{padding:40px 20px;text-align:center;color:#374151;font-size:12px;line-height:1.8}
</style>
</head>
<body>
<div class="sidebar">
  <div class="header">
    <span class="logo">TSM Hub</span>
    <span class="badge">LIVE</span>
  </div>
  <div class="search"><input id="q" placeholder="Search apps..." oninput="filterApps(this.value)"></div>
  <div class="sectors" id="sector-tabs"></div>
  <div class="count"><span id="count">0 apps</span><span id="sector-label">ALL</span></div>
  <div class="list" id="list"></div>
</div>
<div class="main">
  <div class="bar">
    <div class="url" id="url">select an app</div>
    <button class="bar-btn" onclick="reloadFrame()">⟳ Reload</button>
    <button class="bar-btn" onclick="openTab()">↗ Open</button>
  </div>
  <iframe id="frame" src="about:blank" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"></iframe>
  <div class="foot">
    <span class="live">● live</span>
    <span id="active-label">none selected</span>
    <span style="margin-left:auto">tsm-shell hub · tsm-shell.fly.dev</span>
  </div>
</div>
<script>
// ── URL resolver — all local apps served from /html/ ─────────────────────────
const HC_NODES = new Set([
  'hc-billing','hc-compliance','hc-financial','hc-grants',
  'hc-insurance','hc-legal','hc-medical','hc-pharmacy',
  'hc-strategist','hc-taxprep','hc-vendors',
  'healthcare','honor-portal','honorhealth'
]);

function appUrl(key, url) {
  if (url && url.startsWith('/')) return url;
  if (url) return url.startsWith('/html/') ? url : url;
  if (key.startsWith('http')) return key;
  if (HC_NODES.has(key)) return '/html/' + key + '/index.html';
  return '/html/' + key + '/';
}

// ── LOCAL APPS (served from /html/) ──────────────────────────────────────────
const LOCAL_APPS = [
  // Healthcare
  { sector:'Healthcare', name:'HonorHealth Command',  key:'honorhealth' },
  { sector:'Healthcare', name:'HC Billing',           key:'hc-billing' },
  { sector:'Healthcare', name:'HC Compliance',        key:'hc-compliance' },
  { sector:'Healthcare', name:'HC Financial',         key:'hc-financial' },
  { sector:'Healthcare', name:'HC Grants',            key:'hc-grants' },
  { sector:'Healthcare', name:'HC Insurance',         key:'hc-insurance' },
  { sector:'Healthcare', name:'HC Legal',             key:'hc-legal' },
  { sector:'Healthcare', name:'HC Medical',           key:'hc-medical' },
  { sector:'Healthcare', name:'HC Pharmacy',          key:'hc-pharmacy' },
  { sector:'Healthcare', name:'HC Strategist',        key:'hc-strategist' },
  { sector:'Healthcare', name:'HC Tax Prep',          key:'hc-taxprep' },
  { sector:'Healthcare', name:'HC Vendors',           key:'hc-vendors' },
  { sector:'Healthcare', name:'Honor Portal',          key:'honor-portal' },
  { sector:'Healthcare', name:'DME',                  key:'dme' },
  // BPO
  { sector:'BPO', name:'BPO Legal',                   key:'bpo-legal' },
  { sector:'BPO', name:'BPO Realty',                  key:'bpo-realty' },
  { sector:'BPO', name:'BPO Tax',                     key:'bpo-tax' },
  // Financial
  { sector:'Financial', name:'Financial Command',     key:'financial-command' },
  { sector:'Financial', name:'Desert Financial',      key:'desert-financial' },
  { sector:'Financial', name:'Strategist',            key:'strategist' },
  // Construction
  { sector:'Construction', name:'Construction Command', key:'construction-command' },
  { sector:'Construction', name:'Ameris Portal',         key:'ameris-portal' },
  { sector:'Enterprise',    name:'Suite Builder',        key:'suite-builder', url:'/html/suite-builder.html' },
  // Insurance
  { sector:'Insurance', name:'PC Command',            key:'pc-command' },
  { sector:'Insurance', name:'AZ Insurance',          key:'az-ins' },
  // Enterprise
  { sector:'Enterprise', name:'RRD Command',          key:'rrd-command' },
  { sector:'Enterprise', name:'Legal Analyst Pro',    key:'legal-analyst-pro' },
  { sector:'Enterprise', name:'Case Tech',            key:'case-tech' },
  { sector:'Enterprise', name:'REO Pro',              key:'reo-pro' },
  { sector:'Enterprise', name:'Agents',               key:'agents-ins' },
];

// ── EXTERNAL APPS (tsmatter.com) ──────────────────────────────────────────────
const SECTORS = [
  {label:'Healthcare', apps:[
    {name:'Healthcare Command',   url:'https://healthcare.tsmatter.com'},
    {name:'Banner Health',        url:'https://banner-health.tsmatter.com'},
    {name:'HonorHealth',          url:'https://honorhealth.tsmatter.com'},
    {name:'Abrazo Health',        url:'https://abrazo.tsmatter.com'},
    {name:'Valleywise Health',    url:'https://valleywise.tsmatter.com'},
    {name:'HealthOps BPO',        url:'https://bpo-healthcare.tsmatter.com'},
  ]},
  {label:'Insurance', apps:[
    {name:'Insurance Command',    url:'https://insurance-command.tsmatter.com'},
    {name:'AZ Insurance Portal',  url:'https://az-ins.tsmatter.com'},
    {name:'P&C Enterprise Cmd',   url:'https://pc-command.tsmatter.com'},
  ]},
  {label:'Financial', apps:[
    {name:'Financial Command',    url:'https://financial-command.tsmatter.com'},
    {name:'Desert Financial',     url:'https://desert-financial.tsmatter.com'},
    {name:'Financial',            url:'https://financial.tsmatter.com'},
    {name:'Compliance',           url:'https://compliance.tsmatter.com'},
    {name:'Tax Intelligence',     url:'https://tax.tsmatter.com'},
    {name:'Zero Trust',           url:'https://zero-trust.tsmatter.com'},
  ]},
  {label:'Real Estate', apps:[
    {name:'Mortgage Command',     url:'https://mortgage-command.tsmatter.com'},
    {name:'Real Estate Command',  url:'https://real-estate-command.tsmatter.com'},
    {name:'Mortgage',             url:'https://mortgage.tsmatter.com'},
    {name:'BrokerOps BPO',        url:'https://bpo-realty.tsmatter.com'},
    {name:'REO Pro',              url:'https://reo-pro.tsmatter.com'},
  ]},
  {label:'Construction', apps:[
    {name:'Construction Command', url:'https://construction-command.tsmatter.com'},
    {name:'Construction',         url:'https://construction.tsmatter.com'},
    {name:'ConstructionOps BPO',  url:'https://bpo-construction.tsmatter.com'},
    {name:'Ameris Construction',  url:'https://ameris-construction.tsmatter.com'},
  ]},
  {label:'Legal', apps:[
    {name:'Legal Intelligence',   url:'https://legal.tsmatter.com'},
    {name:'LegalOps BPO',         url:'https://bpo-legal.tsmatter.com'},
    {name:'Legal Analyst Pro',    url:'https://legal-analyst-pro.tsmatter.com'},
  ]},
  {label:'Education', apps:[
    {name:'Schools Command',      url:'https://schools-command.tsmatter.com'},
    {name:'Schools',              url:'https://schools.tsmatter.com'},
  ]},
  {label:'Hospitality', apps:[
    {name:'HotelOps Pro',         url:'https://hotelops.tsmatter.com'},
    {name:'Concierge Command',    url:'https://concierge-command.tsmatter.com'},
    {name:'HotelOps BPO',         url:'https://bpo-hotelops.tsmatter.com'},
  ]},
  {label:'Enterprise', apps:[
    {name:'DocPro',               url:'https://docpro.tsmatter.com'},
    {name:'RRD Command',          url:'https://rrd-command.tsmatter.com'},
    {name:'Appointments',         url:'https://appointments.tsmatter.com'},
    {name:'AuditOps',             url:'https://auditops.tsmatter.com'},
    {name:'Music Command',        url:'https://music-command.tsmatter.com'},
    {name:'Zero Trust',           url:'https://zero-trust.tsmatter.com'},
  ]},
  {label:'Demo Decks', apps:[
    {name:'Desert Financial Pitch', url:'https://clients.tsmatter.com/demo/desert-financial-pitch.html'},
    {name:'Command Promo',          url:'https://clients.tsmatter.com/demo/command-promo.html'},
    {name:'Why TSM',                url:'https://clients.tsmatter.com/demo/why-tsm.html'},
    {name:'Bundle Demo',            url:'https://clients.tsmatter.com/demo/bundle.html'},
    {name:'Financial Analyst',      url:'https://clients.tsmatter.com/demo/financial-analyst.html'},
  ]},
];

const EXT_APPS = SECTORS.flatMap(s =>
  s.apps.map(a => ({ sector: s.label, name: a.name, url: a.url, external: true }))
);

const EXT_SECTORS   = SECTORS.map(s => s.label);
const UNIQUE_SECTORS = ['All', 'Deployed', ...EXT_SECTORS];

// ── State ─────────────────────────────────────────────────────────────────────
let activeFilter = 'All';
let searchQuery  = '';
let currentApp   = null;

function buildSectorTabs() {
  const el = document.getElementById('sector-tabs');
  el.innerHTML = UNIQUE_SECTORS.map(s =>
    '<button class="sector-btn' + (s === activeFilter ? ' active' : '') +
    '" onclick="setSector(\'' + s + '\')">' + s + '</button>'
  ).join('');
}

function setSector(s) {
  activeFilter = s;
  searchQuery = '';
  document.getElementById('q').value = '';
  buildSectorTabs();
  render();
}

function getVisible() {
  const q = searchQuery.toLowerCase();
  let pool = [];
  if (activeFilter === 'All')      pool = [...LOCAL_APPS, ...EXT_APPS];
  else if (activeFilter === 'Deployed') pool = LOCAL_APPS;
  else pool = EXT_APPS.filter(a => a.sector === activeFilter);
  if (q) pool = pool.filter(a =>
    a.name.toLowerCase().includes(q) ||
    (a.url || a.key || '').toLowerCase().includes(q)
  );
  return pool;
}

function render() {
  const visible = getVisible();
  document.getElementById('count').textContent = visible.length + ' apps';
  document.getElementById('sector-label').textContent = activeFilter.toUpperCase();

  if (!visible.length) {
    document.getElementById('list').innerHTML = '<div class="empty">No apps match your search.</div>';
    return;
  }

  const grouped = {};
  visible.forEach(a => {
    const g = a.sector || 'Other';
    if (!grouped[g]) grouped[g] = [];
    grouped[g].push(a);
  });

  let html = '';
  Object.keys(grouped).forEach(g => {
    html += '<div class="group-label">' + g + '</div>';
    html += grouped[g].map(a => itemHtml(a)).join('');
  });

  document.getElementById('list').innerHTML = html;

  if (currentApp) {
    document.querySelectorAll('.item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === currentApp);
    });
  }
}

function itemHtml(a) {
  const id = a.url || a.key;
  return '<div class="item" data-id="' + id + '" onclick="loadApp(this)">' +
    '<span class="dot"></span>' +
    '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + a.name + '</span>' +
    (a.external ? '<span class="ext-icon">↗</span>' : '') +
    '</div>';
}

function loadApp(el) {
  const id = el.dataset.id;
  currentApp = id;
  document.querySelectorAll('.item').forEach(e => e.classList.toggle('active', e.dataset.id === id));
  const url = id.startsWith('http') ? id : appUrl(id);
  document.getElementById('url').textContent = url;
  document.getElementById('frame').src = url;
  document.getElementById('active-label').textContent = el.querySelector('span:nth-child(2)').textContent;
}

function reloadFrame() {
  const f = document.getElementById('frame');
  if (f.src && f.src !== 'about:blank') f.src = f.src;
}

function openTab() {
  const f = document.getElementById('frame').src;
  if (f && f !== 'about:blank') window.open(f, '_blank');
}

function filterApps(q) {
  searchQuery = q;
  render();
}

buildSectorTabs();
render();

// Auto-load first local app on start
const first = LOCAL_APPS[0];
if (first) {
  currentApp = first.key;
  const url = appUrl(first.key, first.url);
  document.getElementById('url').textContent = url;
  document.getElementById('frame').src = url;
  document.getElementById('active-label').textContent = first.name;
  document.querySelectorAll('.item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === first.key);
  });
}
</script>
</body>
</html>
