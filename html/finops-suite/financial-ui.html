<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSM Financial Operations · Start Here</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060b06;
  --bg-card:#0c140c;
  --bg-card-hover:#101a10;
  --bg-highlight:#0a1a0f;
  --accent:#00e5a0;
  --accent-dim:#00b880;
  --accent-pale:rgba(0,229,160,0.08);
  --accent-glow:rgba(0,229,160,0.18);
  --accent-border:rgba(0,229,160,0.35);
  --text:#dff5e8;
  --text-dim:#6b9a78;
  --text-muted:#3d6048;
  --border:#162416;
  --border-accent:rgba(0,229,160,0.5);
  --red:#ff4d4d;
  --amber:#f5a623;
  --blue:#4da6ff;
  --font:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.6;min-height:100vh;padding-bottom:80px}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent-dim);border-radius:2px}

/* HEADER */
.header{padding:24px 32px 20px;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.6}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.header-badge{font-size:10px;color:var(--accent);border:1px solid var(--accent-border);padding:3px 10px;letter-spacing:.1em;text-transform:uppercase}
.header-status{display:flex;align-items:center;gap:16px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
.status-text{font-size:11px;color:var(--text-dim)}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 var(--accent-glow)}50%{opacity:.7;box-shadow:0 0 0 4px transparent}}
.header-title{font-size:22px;font-weight:700;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.header-sub{font-size:11px;color:var(--text-dim);letter-spacing:.04em}
.header-sub span{color:var(--accent);opacity:.7}

/* LAYOUT */
.main{display:grid;grid-template-columns:1fr 260px;gap:0;min-height:calc(100vh - 100px)}
.content{padding:24px 28px;border-right:1px solid var(--border)}
.sidebar{padding:20px 20px;position:sticky;top:0;height:fit-content;max-height:calc(100vh - 100px);overflow-y:auto}

/* SECTION LABEL */
.section-label{font-size:10px;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* START HERE BLOCK */
.start-block{border:1px solid var(--accent-border);background:var(--bg-highlight);padding:20px 24px;margin-bottom:24px;position:relative}
.start-block::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent)}
.start-title{font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.start-title-badge{font-size:10px;background:var(--accent);color:var(--bg);padding:2px 8px;letter-spacing:.05em}

/* STEP WIZARD */
.wizard-steps{display:flex;align-items:center;gap:0;margin-bottom:20px}
.wstep{display:flex;align-items:center;gap:8px;flex:1}
.wstep-num{width:24px;height:24px;border:1px solid var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text-muted);flex-shrink:0;transition:all .3s}
.wstep.active .wstep-num{border-color:var(--accent);color:var(--accent);box-shadow:0 0 8px var(--accent-glow)}
.wstep.done .wstep-num{border-color:var(--accent);background:var(--accent);color:var(--bg)}
.wstep-label{font-size:11px;color:var(--text-muted);letter-spacing:.04em;white-space:nowrap;transition:all .3s}
.wstep.active .wstep-label{color:var(--text)}
.wstep.done .wstep-label{color:var(--accent-dim)}
.wstep-line{flex:1;height:1px;background:var(--border);margin:0 6px}
.wstep.done + .wstep-line{background:var(--accent-border)}

/* WIZARD PANEL */
.wizard-panel{min-height:180px}
.wp-q{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.wp-sub{font-size:12px;color:var(--text-dim);margin-bottom:16px}

/* WORKFLOW GRID */
.wf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.wf-card{border:1px solid var(--border);background:var(--bg-card);padding:10px 12px;cursor:pointer;transition:all .2s;position:relative}
.wf-card::before{content:'';position:absolute;top:0;left:0;width:0;height:2px;background:var(--accent);transition:width .2s}
.wf-card:hover{border-color:var(--accent-border);background:var(--bg-card-hover)}
.wf-card:hover::before{width:100%}
.wf-card.sel{border-color:var(--accent);background:var(--accent-pale)}
.wf-card.sel::before{width:100%}
.wf-card-tag{font-size:10px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.wf-card.sel .wf-card-tag{color:var(--accent-dim)}
.wf-card-name{font-size:12px;font-weight:600;color:var(--text)}
.wf-card.sel .wf-card-name{color:var(--accent)}
.wf-card-desc{font-size:11px;color:var(--text-dim);margin-top:2px;line-height:1.4}

/* SOURCE GRID */
.src-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.src-card{border:1px solid var(--border);background:var(--bg-card);padding:14px 16px;cursor:pointer;transition:all .2s;position:relative}
.src-card::before{content:'';position:absolute;top:0;left:0;width:0;height:2px;background:var(--accent);transition:width .2s}
.src-card:hover{border-color:var(--accent-border);background:var(--bg-card-hover)}
.src-card:hover::before{width:100%}
.src-card.sel{border-color:var(--accent);background:var(--accent-pale)}
.src-card.sel::before{width:100%}
.src-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.src-card.sel .src-name{color:var(--accent)}
.src-desc{font-size:11px;color:var(--text-dim);line-height:1.4}

/* SUMMARY */
.sum-row{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.sum-row:last-of-type{border-bottom:none}
.sum-key{font-size:11px;color:var(--text-muted);width:110px;flex-shrink:0;letter-spacing:.04em;text-transform:uppercase;padding-top:1px}
.sum-val{font-size:12px;color:var(--text);flex:1;font-weight:500}
.sum-val.accent{color:var(--accent)}

/* WIZARD FOOTER */
.wf-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.btn-back{background:none;border:none;color:var(--text-dim);font-family:var(--font);font-size:12px;cursor:pointer;padding:0;letter-spacing:.04em;transition:color .2s}
.btn-back:hover{color:var(--text)}
.btn-next{background:none;border:1px solid var(--accent-border);color:var(--accent);font-family:var(--font);font-size:12px;font-weight:600;padding:8px 20px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:all .2s;opacity:.3;pointer-events:none}
.btn-next.on{opacity:1;pointer-events:all}
.btn-next.on:hover{background:var(--accent-pale);box-shadow:0 0 12px var(--accent-glow)}
.btn-run{width:100%;background:var(--accent);color:var(--bg);font-family:var(--font);font-size:13px;font-weight:700;padding:12px;cursor:pointer;border:none;letter-spacing:.08em;text-transform:uppercase;margin-top:14px;transition:all .2s}
.btn-run:hover{background:var(--accent-dim);box-shadow:0 0 20px var(--accent-glow)}
.run-note{font-size:11px;color:var(--text-muted);text-align:center;margin-top:8px;line-height:1.5}

/* MODULE GRID */
.module-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.mod-card{border:1px solid var(--border);background:var(--bg-card);padding:16px;transition:all .25s;position:relative;cursor:pointer;overflow:hidden}
.mod-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:0;background:linear-gradient(0deg,var(--accent-pale),transparent);transition:height .3s}
.mod-card:hover{border-color:var(--accent-border);background:var(--bg-card-hover)}
.mod-card:hover::after{height:40px}
.mod-num{font-size:10px;color:var(--text-muted);letter-spacing:.1em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.mod-num-n{color:var(--accent-dim)}
.mod-badge{font-size:10px;color:var(--accent);border:1px solid var(--accent-border);padding:1px 7px;letter-spacing:.05em;margin-left:auto}
.mod-title{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.mod-subtitle{font-size:11px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.mod-desc{font-size:11px;color:var(--text-dim);line-height:1.5;margin-bottom:12px}
.mod-metrics{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.metric{font-size:11px;border:1px solid var(--border);padding:3px 8px;color:var(--text-dim)}
.metric.hot{border-color:rgba(255,77,77,.4);color:var(--red)}
.metric.warn{border-color:rgba(245,166,35,.4);color:var(--amber)}
.metric.ok{border-color:var(--accent-border);color:var(--accent)}
.mod-btn{width:100%;background:none;border:1px solid var(--accent-border);color:var(--accent);font-family:var(--font);font-size:11px;font-weight:600;padding:7px;cursor:pointer;letter-spacing:.07em;text-transform:uppercase;transition:all .2s}
.mod-btn:hover{background:var(--accent-pale);box-shadow:0 0 8px var(--accent-glow)}

/* 30-SECOND CLOSE */
.close-block{border:1px solid var(--accent-border);background:var(--bg-highlight);padding:20px 24px;margin-bottom:24px;position:relative}
.close-block::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent-dim)}
.close-title{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.close-text{font-size:12px;color:var(--text-dim);line-height:1.7;margin-bottom:10px}
.close-text strong{color:var(--text)}
.close-final{font-size:12px;color:var(--accent);font-style:italic}

/* TALK TRACK */
.track-block{border:1px solid var(--border);background:var(--bg-card);padding:20px 24px;margin-bottom:24px}
.track-title{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px}
.track-step{margin-bottom:14px;padding-left:20px;position:relative}
.track-step::before{content:attr(data-n);position:absolute;left:0;top:0;font-size:11px;color:var(--accent);font-weight:700}
.track-action{font-size:12px;color:var(--text);font-weight:600;margin-bottom:2px}
.track-say{font-size:12px;color:var(--text-dim);font-style:italic;line-height:1.5}
.track-say em{color:var(--text);font-style:normal}

/* SIDEBAR */
.sidebar-title{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.sidebar-sub{font-size:11px;color:var(--text-dim);margin-bottom:16px;line-height:1.4}
.guide-btn{width:100%;background:none;border:1px solid var(--border);color:var(--text-dim);font-family:var(--font);font-size:12px;padding:9px 12px;text-align:left;cursor:pointer;transition:all .2s;margin-bottom:4px;letter-spacing:.02em;display:flex;align-items:center;gap:8px}
.guide-btn:hover{border-color:var(--accent-border);color:var(--accent);background:var(--accent-pale)}
.guide-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-pale)}
.guide-chevron{margin-left:auto;font-size:10px;color:var(--text-muted);transition:transform .2s}
.guide-btn.active .guide-chevron{transform:rotate(90deg);color:var(--accent)}
.guide-expand{display:none;border:1px solid var(--border);border-top:none;background:var(--bg);padding:10px 12px;margin-bottom:4px}
.guide-expand.open{display:block}
.guide-step{font-size:11px;color:var(--text-dim);padding:3px 0;border-bottom:1px solid var(--border);line-height:1.4}
.guide-step:last-child{border-bottom:none}
.guide-step span{color:var(--accent-dim)}

.sidebar-divider{height:1px;background:var(--border);margin:16px 0}
.sidebar-metric{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.sidebar-metric:last-child{border-bottom:none}
.sm-label{font-size:11px;color:var(--text-muted);letter-spacing:.04em}
.sm-val{font-size:12px;font-weight:600}
.sm-val.hot{color:var(--red)}
.sm-val.warn{color:var(--amber)}
.sm-val.ok{color:var(--accent)}

/* HOW TO READ */
.how-block{border:1px solid var(--border);background:var(--bg-card);padding:16px 20px;margin-bottom:24px}
.how-title{font-size:11px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.how-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.how-row:last-child{border-bottom:none}
.how-key{font-size:12px;color:var(--accent);font-weight:600;width:180px;flex-shrink:0}
.how-val{font-size:12px;color:var(--text-dim)}

/* STICKY CTA */
.cta-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(6,11,6,.96);border-top:1px solid var(--accent-border);padding:12px 32px;display:flex;align-items:center;justify-content:space-between;z-index:100;backdrop-filter:blur(4px)}
.cta-note{font-size:11px;color:var(--text-muted);letter-spacing:.04em}
.cta-note strong{color:var(--text)}
.cta-btns{display:flex;gap:8px}
.cta-btn{background:none;border:1px solid var(--accent-border);color:var(--accent);font-family:var(--font);font-size:11px;font-weight:600;padding:7px 16px;cursor:pointer;letter-spacing:.07em;text-transform:uppercase;transition:all .2s}
.cta-btn:hover{background:var(--accent-pale)}
.cta-btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.cta-btn.primary:hover{background:var(--accent-dim);box-shadow:0 0 12px var(--accent-glow)}

/* HOW-TO FLOAT */
.how-to-btn{position:fixed;right:20px;bottom:70px;z-index:101;background:var(--accent);color:var(--bg);border:none;font-family:var(--font);font-size:11px;font-weight:700;padding:10px 16px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:all .2s;box-shadow:0 0 16px var(--accent-glow)}
.how-to-btn:hover{background:var(--accent-dim)}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.wizard-panel{animation:fadeIn .25s ease}

/* SCAN LINE EFFECT */
.header::after{content:'';position:absolute;top:-100%;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,229,160,.3),transparent);animation:scan 4s linear infinite;pointer-events:none}
@keyframes scan{from{top:-10%}to{top:110%}}

/* CATEGORY CARDS */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.cat-card{border:1px solid var(--border);background:var(--bg-card);padding:12px;cursor:pointer;transition:all .2s;position:relative}
.cat-card:hover{border-color:var(--accent-border);background:var(--bg-card-hover)}
.cat-tag{font-size:10px;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.cat-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px}
.cat-items{font-size:11px;color:var(--text-dim);line-height:1.5}
</style>





</body>
</html>
