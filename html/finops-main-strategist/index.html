<script>
function updateTimestamp(){
  const el=document.getElementById('finops-ts');
  if(el) el.innerText=new Date().toLocaleString();
}
updateTimestamp();

function log(msg){
  const el=document.getElementById('finops-log');
  if(!el) return;
  const line = "["+new Date().toLocaleTimeString()+"] " + msg;
  el.innerHTML = line + "<br>" + el.innerHTML;
}

function runFinopsAction(type){
  log("Executing: "+type);

  let output = "";

  if(type==="AP_QUEUE"){
    output = "AP queue prioritized. High-risk vendors flagged. Approval routing initiated.";
  }
  if(type==="RECON_REVIEW"){
    output = "Bank reconciliation workflow triggered. Matching engine activated.";
  }
  if(type==="MONTH_END"){
    output = "Month-end checklist locked. Close readiness confirmed.";
  }
  if(type==="1099_TRACK"){
    output = "1099 vendor outreach started. W-9 requests sent.";
  }
  if(type==="EXPORT"){
    output = "Executive report generated. Ready for controller review.";
  }

  log(output);
  if(typeof saveFinopsBackendAction === 'function'){
    saveFinopsBackendAction({
      type,
      title:'FinOps Action Executed',
      owner: type==='AP_QUEUE'?'AP Queue':type==='RECON_REVIEW'?'Accounting Review':type==='MONTH_END'?'Controller Review':type==='1099_TRACK'?'Tax / 1099 Queue':'Executive Reporting',
      status:'ACTIONED',
      lane:'Financial Operations',
      summary:output
    });
  }

  // update BNCA panel if present
  const bnca = document.querySelector("#finops-bnca, .finops-bnca");
  if(bnca){
    bnca.innerText = "UPDATED ACTION:\n\n" + output;
  }
}
</script>



<script id="finops-backend-action-js">
async function saveFinopsBackendAction(payload){
  try{
    await fetch('/api/finops/action',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify(payload)
    });
  }catch(e){ console.warn('FinOps backend action save failed', e); }
}

async function saveFinopsBackendReport(summary){
  try{
    await fetch('/api/finops/report',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({
        title:'TSM Financial Operations Executive Report',
        summary,
        metrics:{arRisk:'$18.4K', taxOpportunity:'$34K', securityGaps:6, closeReadiness:'84%'}
      })
    });
  }catch(e){ console.warn('FinOps backend report save failed', e); }
}

async function loadFinopsBackendFeed(){
  try{
    const data = await fetch('/api/finops/actions',{cache:'no-store'}).then(r=>r.json());
    const log = document.getElementById('finops-log');
    if(log && data.actions?.length){
      log.innerHTML = data.actions.slice(0,8).map(a =>
        `[${new Date(a.ts).toLocaleTimeString()}] ${a.type} · ${a.owner} · ${a.status}<br>${a.summary}`
      ).join('<br><br>');
    }
  }catch(e){}
}
setInterval(loadFinopsBackendFeed,5000);
setTimeout(loadFinopsBackendFeed,500);
</script>

<script id="finops-terminal-feed-js">
(function(){
  let lastFeedText = "";

  window.renderFinopsTerminalFeed = function(lines){
    const feed = document.getElementById("finops-feed");
    if(!feed) return;

    const html = lines.map(x => `<span class="finops-terminal-line">${x}</span>`).join("");
    if(html !== lastFeedText){
      lastFeedText = html;
      feed.innerHTML = html;
      feed.closest(".finops-top-feed")?.classList.add("finops-feed-hot");
      setTimeout(()=>feed.closest(".finops-top-feed")?.classList.remove("finops-feed-hot"),800);
    }
  };

  const oldLoad = window.loadFinopsFeed;
  window.loadFinopsFeed = async function(){
    try{
      const res = await fetch('/api/finops/actions',{cache:'no-store'});
      const data = await res.json();

      if(!data.actions || data.actions.length === 0){
        renderFinopsTerminalFeed(["[READY] Awaiting actions..."]);
        return;
      }

      renderFinopsTerminalFeed(
        data.actions.slice(0,6).map(a =>
          "[" + new Date(a.ts).toLocaleTimeString() + "] " +
          "✓ " + a.type + " :: " + (a.summary || a.status || "Action logged")
        )
      );
    }catch(e){
      renderFinopsTerminalFeed(["[OFFLINE] Action feed reconnecting..."]);
    }
  };

  setInterval(window.loadFinopsFeed, 2000);
  setTimeout(window.loadFinopsFeed, 400);
})();
</script>


<style>
#finops-feed{
  min-height:80px;
  font-family:monospace;
  font-size:13px;
  line-height:1.5;
  color:#00f59f;
  text-shadow:0 0 8px rgba(0,245,159,.4);
}
.finops-line{
  opacity:0;
  transform:translateY(6px);
  animation:fadeIn .3s forwards;
}
@keyframes fadeIn{
  to{opacity:1;transform:translateY(0)}
}
.cursor::after{
  content:" █";
  animation:blink .8s infinite;
}
@keyframes blink{
  0%,50%{opacity:1}
  51%,100%{opacity:0}
}
</style>

<script>
(function(){

let rendered = [];

function renderStream(actions){
  const feed = document.getElementById("finops-feed");
  if(!feed) return;

  const lines = actions.slice(-6).map(a =>
    "[" + new Date(a.ts).toLocaleTimeString() + "] " +
    "→ " + a.type + " :: " + (a.summary || "processing")
  );

  if(JSON.stringify(lines) === JSON.stringify(rendered)) return;
  rendered = lines;

  feed.innerHTML = "";

  let i = 0;

  function streamNext(){
    if(i >= lines.length){
      const done = document.createElement("div");
      done.className = "finops-line cursor";
      done.innerText = "[READY] Awaiting next action...";
      feed.appendChild(done);
      return;
    }

    const el = document.createElement("div");
    el.className = "finops-line";
    el.innerText = lines[i];

    feed.appendChild(el);
    i++;

    setTimeout(streamNext, 220);
  }

  streamNext();
}

async function load(){
  try{
    const res = await fetch('/api/finops/actions',{cache:'no-store'});
    const data = await res.json();

    if(!data.actions || data.actions.length === 0){
      document.getElementById("finops-feed").innerHTML =
        '<div class="cursor">[READY] Awaiting actions...</div>';
      return;
    }

    renderStream(data.actions);

  }catch(e){
    document.getElementById("finops-feed").innerHTML =
      '<div class="cursor">[SYSTEM] Reconnecting...</div>';
  }
}

setInterval(load,2000);
setTimeout(load,400);

})();
</script>
