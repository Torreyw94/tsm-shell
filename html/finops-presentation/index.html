<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TSM FinOps Financial Operations Layer</title>

<style>
body{margin:0;background:#05090d;color:#d9f3ff;font-family:ui-monospace,Menlo}
header{padding:26px;border-bottom:1px solid #123050}
h1{color:#00e0ff;letter-spacing:.12em}
.wrap{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.card{background:#061018;border:1px solid #123050;border-radius:12px;padding:16px}
.val{font-size:26px;color:#00f59f;font-weight:900}
button{background:#00e0ff;color:#001018;border:none;padding:10px 14px;border-radius:8px;margin:6px;font-weight:900;cursor:pointer}
.output{margin-top:12px;padding:12px;background:#02070d;border:1px solid #123050;border-radius:10px}
.doc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-top:10px}
.doc{background:#061018;padding:12px;border-radius:10px;border:1px solid #123050;cursor:pointer}
.doc.active{border-color:#00e0ff}
</style>
</head>

<body>

<header>
<h1>TSM FINANCIAL OPERATIONS LAYER</h1>
<div>$1,750/mo · Staff Accountant System</div>

<button onclick="startAutoDemo()">AUTO DEMO</button>
<button onclick="runDoc()">RUN DOCUMENT</button>
<button onclick="openMain()">OPEN FINOPS MAIN STRATEGIST</button>
<button onclick="showClose()">EXECUTIVE CLOSE</button>
</header>

<div class="wrap">

<div class="grid">
<div class="card"><div class="val">$18.4K</div>AR At Risk</div>
<div class="card"><div class="val">$34K</div>Tax Opportunity</div>
<div class="card"><div class="val">12</div>Invoices Pending</div>
<div class="card"><div class="val">84%</div>Close Readiness</div>
</div>

<h3>FINOPS DOCUMENT INTELLIGENCE</h3>

<div class="doc-grid" id="docs"></div>

<div class="output" id="out">Ready.</div>

</div>

<script>

const DOCS = [
"Bank Reconciliation",
"AP Aging",
"AR Ledger",
"Financial Statements",
"Budget vs Actual",
"GL Detail",
"1099 Tracker",
"Audit Findings"
];

let selected = DOCS[0];

function render(){
document.getElementById('docs').innerHTML = DOCS.map(d =>
`<div class="doc ${d===selected?'active':''}" onclick="selectDoc('${d}')">${d}</div>`
).join('');
}

function selectDoc(d){
selected=d;
render();
document.getElementById('out').textContent = d + " selected.";
}

function runDoc(){
document.getElementById('out').textContent =
`Processing ${selected}

Financial Intel → OK
Compliance → OK
Tax → OK

BNCA:
Prioritize reconciliation variance and vendor aging risk.

Outcome:
$12K variance identified
$8K vendor delay risk reduced
`;
}

function openMain(){
window.open('/html/finops-main-strategist/index.html','_blank');
}

function showClose(){
alert("Start pilot or walkthrough");
}

function startAutoDemo(){
let i=0;
const steps=[
"These are your accounting workflows",
"We run one instantly",
"Processing across financial, tax, compliance",
"BNCA generated",
"Executive view ready"
];
const t=setInterval(()=>{
document.getElementById('out').textContent=steps[i];
i++;
if(i>=steps.length) clearInterval(t);
},1500);
}

render();

</script>

</body>
</html>
