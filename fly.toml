# fly.toml — TSM Shell deployment config
# Deploy with: fly deploy

app = "tsm-shell"          # change to your actual fly app name
primary_region = "dfw"     # Dallas — closest to Phoenix AZ

[build]
  # No Dockerfile needed — Fly detects Node automatically via package.json

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 200

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
