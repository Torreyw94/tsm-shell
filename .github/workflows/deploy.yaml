name: Deploy to Fly.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy tsm-shell
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --app tsm-shell
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Inject GROQ_API_KEY as Fly secret
        run: flyctl secrets set GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" --app tsm-shell --stage
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
